<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chasing Change | Equipment Picks</title>
    <meta name="description" content="Curated Body Core equipment picks for running, lifting, recovery, and at-home training." />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Muli:wght@300;400;600;700&family=Museo+Moderno:wght@500;700&family=Raleway:wght@500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../shared.css" />
    <script src="../shared-global-nav.js" defer></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              cc: {
                bg: "#f5f5f7",
                text: "#071f35",
                accent: "#77d770",
                panel: "#ffffff",
              },
            },
            fontFamily: {
              brand: ["Museo Moderno", "Raleway", "sans-serif"],
              heading: ["Raleway", "system-ui", "sans-serif"],
              body: ["Muli", "system-ui", "sans-serif"],
            },
            boxShadow: {
              soft: "0 14px 45px rgba(7, 31, 53, 0.08)",
            },
          },
        },
      };
    </script>
  </head>
  <body class="min-h-screen bg-cc-bg font-body text-cc-text antialiased cc-page">
    <main class="mx-auto w-full max-w-6xl px-5 py-10 sm:px-8">
      <p class="font-brand text-sm tracking-[0.18em] text-cc-text/75">Chasing Change</p>
      <h1 class="mt-3 font-heading text-4xl font-extrabold tracking-tight sm:text-5xl">Equipment Picks</h1>
      <p class="mt-3 max-w-3xl text-sm text-cc-text/75 sm:text-base">Body Core recommendations for runners, lifters, yoga, and hybrid athletes.</p>

    </main>

    <script>
      const equipmentRecommendations = [
        {
          category: "Shoes",
          items: [
            { name: "FuelCell SuperComp Trainer v3", label: "Long Run Support", description: "Ideal for longer training efforts and cushioned mileage while protecting your legs.", recommendedFor: "Recovery runs and long aerobic work", url: "https://www.newbalance.com/pd/fuelcell-supercomp-trainer-v3/MRCXV4-50691.html" },
            { name: "FuelCell Rebel V5", label: "Uptempo Option", description: "Lightweight option for faster sessions and progression runs.", recommendedFor: "Tempo days and speed blocks", url: "https://www.newbalance.com/pd/fuelcell-rebel-v5/MFCXLY5-D-10.html" },
            { name: "Hoka Clifton 10", label: "Daily Trainer", description: "Dependable daily trainer for comfort and consistent weekly mileage.", recommendedFor: "Daily easy runs", url: "https://www.hoka.com/en/us/mens-everyday-running-gear/clifton-10/197634750774.html" },
          ],
        },
        {
          category: "Gym + Home",
          items: [
            { name: "Everyday Holdall Medium", label: "Gym Organization", description: "Keeps your gym kit organized to reduce friction before sessions.", recommendedFor: "Daily lifting sessions", url: "https://www.gymshark.com/products/gymshark-medium-everyday-holdall-black-ss23" },
            { name: "Ab Roller Wheel", label: "Core Control", description: "Simple core tool for trunk strength and anti-extension control.", recommendedFor: "Core strength circuits", url: "https://www.amazon.com/Abiarst-Equipment-Abdominal-Strength-Accessories/dp/B0CMP6Z2JV" },
            { name: "Gaiam Yoga Mat", label: "Mobility + Recovery", description: "Supportive mat for mobility flows and recovery sessions.", recommendedFor: "Yoga and cooldown work", url: "https://www.amazon.com/dp/B07W62GJFL" },
          ],
        },
        {
          category: "Recovery",
          items: [
            { name: "Slant Board", label: "Mobility Prep", description: "Useful for calf work, ankle mobility, and shin-splint prevention.", recommendedFor: "Lower-leg prep before runs", url: "https://www.amazon.com/XCMVCN-Calf-Stretching-Adjustable-Equipment/dp/B0FGXXSL4J" },
            { name: "Diclofenac Gel", label: "Topical Support", description: "Topical support option during high-volume blocks when paired with smart programming.", recommendedFor: "Deload weeks and heavy blocks", url: "https://www.amazon.com/Amazon-Basic-Care-Arthritis-Diclofenac/dp/B08ZF5LVWQ" },
          ],
        },
      ];

      const categoriesEl = document.getElementById("equipmentCategories");

      categoriesEl.innerHTML = equipmentRecommendations
        .map(
          (category) => `
            <section class="rounded-2xl bg-cc-panel/95 p-4 shadow-soft ring-1 ring-black/10 sm:p-5">
              <h2 class="font-heading text-2xl font-extrabold">${category.category}</h2>
              <div class="mt-3 grid gap-3 sm:grid-cols-2 xl:grid-cols-3">
                ${category.items
                  .map(
                    (item) => `
                      <article class="rounded-2xl bg-white p-4 ring-1 ring-black/10">
                        <p class="inline-flex rounded-full bg-cc-text/5 px-2.5 py-1 text-[11px] font-semibold uppercase tracking-[0.14em] text-cc-text/70">${item.label}</p>
                        <h3 class="mt-2 font-heading text-lg font-extrabold">${item.name}</h3>
                        <p class="mt-2 text-sm text-cc-text/75">${item.description}</p>
                        <p class="mt-2 text-xs font-semibold text-cc-text/65">Recommended for: ${item.recommendedFor}</p>
                        <a href="${item.url}" target="_blank" rel="noopener noreferrer" class="mt-3 inline-block text-sm font-semibold underline decoration-cc-accent decoration-2 underline-offset-4">Open resource →</a>
                      </article>
                    `,
                  )
                  .join("")}
              </div>
            </section>
          `,
        )
        .join("");
    </script>
  
    <footer class="w-full px-5 pb-5 sm:px-8">
      <p class="text-center text-xs text-cc-text/70 sm:text-sm">© 2026 Chasing Change — 1% better every day.</p>
    </footer>

  </body>
</html>
