<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chasing Change — Founder’s Calendar</title>
    <meta
      name="description"
      content="Founder’s Calendar helps you structure Monday–Sunday priorities across the six Chasing Change cores."
    />

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../shared-admin.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js" defer></script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Muli:wght@300;400;600;700&family=Museo+Moderno:wght@500;700&family=Raleway:wght@500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../shared.css" />
    <script src="../shared-global-nav.js" defer></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              cc: {
                text: "#071f35",
                bg: "#f5f5f7",
                outline: "#77d770",
                card: "#ffffff",
              },
            },
            fontFamily: {
              body: ["Muli", "Mulish", "system-ui", "-apple-system", "BlinkMacSystemFont", "Segoe UI", "sans-serif"],
              heading: ["Raleway", "system-ui", "-apple-system", "BlinkMacSystemFont", "Segoe UI", "sans-serif"],
              brand: ["Museo Moderno", "Raleway", "sans-serif"],
            },
            boxShadow: {
              soft: "0 10px 30px rgba(7,31,53,0.10)",
            },
          },
        },
      };
    </script>
    <style>
      @media print {
        .cc-global-nav-wrap,
        [data-no-print="true"] {
          display: none !important;
        }

        body {
          background: #fff !important;
        }

        .print-shell {
          box-shadow: none !important;
          border: 1px solid rgba(7, 31, 53, 0.12);
        }
      }
    </style>
  </head>
  <body class="min-h-screen bg-cc-bg text-cc-text font-body cc-page">
    <div data-admin-edit-root class="relative cc-page-shell px-4 sm:px-6 py-8 sm:py-10">
      <div class="mx-auto w-full max-w-7xl">
        <header class="max-w-3xl px-1 sm:px-2">
          <p class="font-brand text-sm uppercase tracking-[0.16em] text-cc-text/70">Life Core Tool</p>
          <h1 class="mt-3 font-heading text-4xl sm:text-5xl font-extrabold">Founder’s Calendar</h1>
          <p class="mt-4 text-lg text-cc-text/80 font-heading">Choose what matters before the week begins.</p>
        </header>

        <main class="mt-8 rounded-3xl bg-white shadow-soft ring-1 ring-black/5 p-4 sm:p-6 lg:p-8 print-shell">
          <section id="dayGrid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4"></section>

          <section class="mt-8 rounded-2xl bg-cc-bg ring-1 ring-black/10 p-4 sm:p-5">
            <div class="flex flex-wrap items-center justify-between gap-3">
              <h2 class="font-heading font-bold text-xl">Weekly Core Balance</h2>
              <p id="missingCoreMessage" class="text-sm text-cc-text/75"></p>
            </div>
            <div id="coreTotals" class="mt-4 grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-6 gap-3"></div>
          </section>

          <section data-no-print="true" class="mt-8 flex flex-wrap gap-3">
            <button id="saveWeekBtn" type="button" class="rounded-xl px-4 py-2.5 bg-cc-outline text-cc-text font-semibold ring-1 ring-cc-outline/80 hover:opacity-90">
              Save Week
            </button>
            <button id="resetWeekBtn" type="button" class="rounded-xl px-4 py-2.5 bg-white text-cc-text font-semibold ring-1 ring-black/15 hover:bg-cc-bg">
              Reset Week
            </button>
            <button id="exportWeekBtn" type="button" class="rounded-xl px-4 py-2.5 bg-white text-cc-text font-semibold ring-1 ring-black/15 hover:bg-cc-bg">
              Export Founder Week
            </button>
            <button id="saveImageBtn" type="button" class="rounded-xl px-4 py-2.5 bg-white text-cc-text font-semibold ring-1 ring-black/15 hover:bg-cc-bg">
              Save as Image
            </button>
            <button id="emailCoachBtn" type="button" class="rounded-xl px-4 py-2.5 bg-white text-cc-text font-semibold ring-1 ring-black/15 hover:bg-cc-bg">
              Email This to Your Coach
            </button>
            <p id="statusMessage" class="w-full text-sm text-cc-text/75 mt-1" aria-live="polite"></p>
          </section>
        </main>

        <footer class="mt-6 pb-3">
          <p class="text-center text-xs sm:text-sm text-cc-text/70">Small actions repeated weekly create identity-level change.</p>
        </footer>
      </div>
    </div>

    <script>
      const DAYS = ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday", "Sunday"];
      const STORAGE_KEY = "cc-founders-calendar-week";
      const CUSTOM_STORAGE_KEY = "cc-founders-calendar-custom-priorities";

      const CORE_ORDER = ["Body", "Art", "Mind", "Soul", "Career", "Life"];
      const ACTIVITY_MAP = {
        Body: ["Lift", "Run", "Yoga", "Walk", "Mobility", "Meal Prep", "Recovery"],
        Art: ["Write", "Film", "Edit", "Read Craft", "Practice Music", "Design", "Create Content"],
        Mind: ["Weekly Planning", "Read", "Study", "Skill Building", "Deep Work", "Journal", "Reflection"],
        Soul: ["Church", "Prayer", "Meditation", "Stillness", "Gratitude", "Scripture", "Sabbath"],
        Career: ["Work", "Admin", "Sales Calls", "Client Work", "Networking", "Website Work", "Business Development"],
        Life: ["Friends", "Family", "Date", "Clean Home", "Errands", "Budget", "Rest"],
      };

      const CORE_STYLES = {
        Body: "bg-green-100 text-green-800",
        Art: "bg-yellow-100 text-yellow-900",
        Mind: "bg-blue-100 text-blue-800",
        Soul: "bg-violet-100 text-violet-800",
        Career: "bg-red-100 text-red-800",
        Life: "bg-orange-100 text-orange-800",
      };

      const dayGrid = document.getElementById("dayGrid");
      const coreTotals = document.getElementById("coreTotals");
      const missingCoreMessage = document.getElementById("missingCoreMessage");
      const statusMessage = document.getElementById("statusMessage");
      const saveWeekBtn = document.getElementById("saveWeekBtn");
      const resetWeekBtn = document.getElementById("resetWeekBtn");
      const exportWeekBtn = document.getElementById("exportWeekBtn");
      const saveImageBtn = document.getElementById("saveImageBtn");
      const emailCoachBtn = document.getElementById("emailCoachBtn");

      let customPriorityMap = loadJSON(CUSTOM_STORAGE_KEY, {});
      let weekState = loadJSON(STORAGE_KEY, createEmptyWeek());

      function createEmptyWeek() {
        return DAYS.reduce((acc, day) => {
          acc[day] = [];
          return acc;
        }, {});
      }

      function loadJSON(key, fallback) {
        try {
          const raw = localStorage.getItem(key);
          return raw ? JSON.parse(raw) : fallback;
        } catch {
          return fallback;
        }
      }

      function addPriorityToDay(day, priority) {
        if (!weekState[day]) weekState[day] = [];
        if (weekState[day].length >= 3) return false;

        const exists = weekState[day].some((item) => item.label.toLowerCase() === priority.label.toLowerCase());
        if (exists) return false;

        weekState[day].push(priority);
        persist();
        render();
        return true;
      }

      function removePriorityFromDay(day, index) {
        if (!weekState[day]) return;
        weekState[day].splice(index, 1);
        persist();
        render();
      }

      function persist() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(weekState));
        localStorage.setItem(CUSTOM_STORAGE_KEY, JSON.stringify(customPriorityMap));
      }

      function renderDayCard(day) {
        const selected = weekState[day] || [];

        const selectedRows = selected.length
          ? selected
              .map(
                (priority, idx) => `
                  <li class="flex items-center justify-between gap-2 rounded-xl bg-white ring-1 ring-black/10 px-3 py-2">
                    <div class="flex items-center gap-2 min-w-0">
                      <span class="text-xs px-2 py-1 rounded-full font-semibold ${CORE_STYLES[priority.core] || CORE_STYLES.Life}">${priority.core}</span>
                      <p class="text-sm font-semibold text-cc-text truncate">${priority.label}</p>
                    </div>
                    <div class="flex items-center gap-2">
                      <button data-remove-index="${idx}" class="text-xs font-semibold text-cc-text/65 hover:text-cc-text" aria-label="Remove ${priority.label}">Remove</button>
                    </div>
                  </li>
                `
              )
              .join("")
          : '<li class="text-sm text-cc-text/60">No priorities selected yet.</li>';

        const guidance =
          selected.length === 3
            ? "Strong structure set for this day."
            : "Founders choose what moves the week forward before it begins.";

        const customDataListId = `custom-list-${day.toLowerCase()}`;

        return `
          <article data-day-card="${day}" class="rounded-2xl bg-cc-bg ring-1 ring-black/10 p-4 space-y-4">
            <div class="flex items-center justify-between gap-2">
              <h3 class="font-heading text-xl font-bold">${day}</h3>
              <p class="text-xs font-semibold text-cc-text/70">${selected.length} / 3 priorities selected</p>
            </div>

            <ul class="space-y-2 min-h-[88px]">${selectedRows}</ul>

            <p class="text-xs text-cc-text/70">${guidance}</p>

            <div class="space-y-2" data-no-print="true">
              <div class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-4 gap-2">
                <select class="day-core w-full rounded-xl bg-white ring-1 ring-black/10 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-cc-outline/70">
                  <option value="">Select Core...</option>
                  ${CORE_ORDER.map((core) => `<option value="${core}">${core}</option>`).join("")}
                </select>
                <select class="day-activity w-full rounded-xl bg-white ring-1 ring-black/10 px-3 py-2 text-sm disabled:bg-black/5 disabled:text-cc-text/45 focus:outline-none focus:ring-2 focus:ring-cc-outline/70" disabled>
                  <option value="">Select Activity...</option>
                </select>
                <input class="custom-activity hidden rounded-xl bg-white ring-1 ring-black/10 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-cc-outline/70" list="${customDataListId}" placeholder="Enter custom task" />
                <datalist id="${customDataListId}"></datalist>
                <div class="sm:col-span-2 xl:col-span-4 grid grid-cols-1 gap-2">
                  <button type="button" class="add-activity rounded-xl px-3 py-2 text-sm font-semibold bg-white ring-1 ring-black/15 hover:bg-cc-bg">Add</button>
                </div>
              </div>
            </div>
          </article>
        `;
      }

      function renderCoreTotals() {
        const totals = { Body: 0, Art: 0, Mind: 0, Soul: 0, Career: 0, Life: 0 };

        DAYS.forEach((day) => {
          (weekState[day] || []).forEach((item) => {
            totals[item.core] = (totals[item.core] || 0) + 1;
          });
        });

        coreTotals.innerHTML = Object.entries(totals)
          .map(
            ([core, total]) => `
            <div class="rounded-xl bg-white ring-1 ring-black/10 px-3 py-2">
              <p class="text-xs text-cc-text/65">${core}</p>
              <p class="font-heading text-xl font-bold">${total}</p>
            </div>
          `
          )
          .join("");

        const missingCore = Object.entries(totals).find(([, total]) => total === 0)?.[0];
        missingCoreMessage.textContent = missingCore
          ? `Your week currently has no selections in ${missingCore}. Consider adding reflection or stillness.`
          : "Balanced across all six cores.";
      }

      function render() {
        dayGrid.innerHTML = DAYS.map((day) => renderDayCard(day)).join("");
        renderCoreTotals();
        initializeDayControls();
      }

      function getCustomTasksByCore(core) {
        return Object.values(customPriorityMap)
          .filter((item) => item.core === core)
          .map((item) => item.label)
          .sort((a, b) => a.localeCompare(b));
      }

      function initializeDayControls() {
        dayGrid.querySelectorAll("[data-day-card]").forEach((card) => {
          const coreSelect = card.querySelector(".day-core");
          const activitySelect = card.querySelector(".day-activity");
          const customActivityInput = card.querySelector(".custom-activity");
          const customList = card.querySelector("datalist");

          if (!coreSelect || !activitySelect || !customActivityInput || !customList) return;

          const setControlsForCore = (coreValue) => {
            const hasCore = Boolean(coreValue);
            activitySelect.disabled = !hasCore;
            customActivityInput.classList.add("hidden");
            customActivityInput.value = "";

            activitySelect.innerHTML = `<option value="">Select Activity...</option>`;
            customList.innerHTML = "";
            if (!hasCore) return;

            const filteredActivities = ACTIVITY_MAP[coreValue] || [];
            filteredActivities.forEach((activity) => {
              const option = document.createElement("option");
              option.value = activity;
              option.textContent = activity;
              activitySelect.appendChild(option);
            });
            const customOption = document.createElement("option");
            customOption.value = "__custom__";
            customOption.textContent = "Custom...";
            activitySelect.appendChild(customOption);

            getCustomTasksByCore(coreValue).forEach((task) => {
              const option = document.createElement("option");
              option.value = task;
              customList.appendChild(option);
            });
          };

          coreSelect.addEventListener("change", () => {
            activitySelect.value = "";
            setControlsForCore(coreSelect.value);
          });

          activitySelect.addEventListener("change", () => {
            const isCustomSelected = activitySelect.value === "__custom__";
            customActivityInput.classList.toggle("hidden", !isCustomSelected);
            if (!isCustomSelected) {
              customActivityInput.value = "";
              return;
            }
            customActivityInput.focus();
          });

          setControlsForCore(coreSelect.value);
        });
      }

      dayGrid.addEventListener("click", (event) => {
        const card = event.target.closest("[data-day-card]");
        if (!card) return;
        const day = card.getAttribute("data-day-card");

        if (event.target.matches(".add-activity")) {
          const coreSelect = card.querySelector(".day-core");
          const activitySelect = card.querySelector(".day-activity");
          const customActivityInput = card.querySelector(".custom-activity");
          const selectedCore = coreSelect?.value || "";
          const selectedActivityValue = (activitySelect?.value || "").trim();
          const isCustom = selectedActivityValue === "__custom__";
          const selectedLabel = isCustom ? (customActivityInput?.value || "").trim() : selectedActivityValue;
          if (!selectedCore || !selectedLabel) {
            statusMessage.textContent = isCustom ? "Enter a custom task first." : "Select a core and task first.";
            return;
          }
          if (isCustom) {
            customPriorityMap[`${selectedCore.toLowerCase()}::${selectedLabel.toLowerCase()}`] = {
              label: selectedLabel,
              core: selectedCore,
              custom: true,
            };
          }
          const wasAdded = addPriorityToDay(day, { label: selectedLabel, core: selectedCore, custom: isCustom });
          if (!wasAdded) {
            statusMessage.textContent = "You can only add up to three unique priorities per day.";
          }
          return;
        }

        if (event.target.matches("[data-remove-index]")) {
          const idx = Number(event.target.getAttribute("data-remove-index"));
          removePriorityFromDay(day, idx);
        }
      });

      saveWeekBtn.addEventListener("click", () => {
        persist();
        statusMessage.textContent = "Week saved locally to this browser.";
      });

      resetWeekBtn.addEventListener("click", () => {
        weekState = createEmptyWeek();
        persist();
        render();
        statusMessage.textContent = "Week reset.";
      });

      exportWeekBtn.addEventListener("click", () => {
        statusMessage.textContent = "Preparing printable view...";
        window.print();
      });

      saveImageBtn.addEventListener("click", async () => {
        const target = document.querySelector(".print-shell");
        if (!target) {
          statusMessage.textContent = "Could not find planner layout to capture.";
          return;
        }

        if (typeof window.html2canvas !== "function") {
          statusMessage.textContent = "Image export library did not load. Please try again.";
          return;
        }

        statusMessage.textContent = "Rendering image...";
        try {
          const canvas = await window.html2canvas(target, {
            backgroundColor: "#f5f5f7",
            scale: Math.max(window.devicePixelRatio || 1, 2),
            useCORS: true,
          });
          const link = document.createElement("a");
          link.href = canvas.toDataURL("image/png");
          link.download = "founders-calendar-week.png";
          link.click();
          statusMessage.textContent = "Saved founder week image.";
        } catch (error) {
          statusMessage.textContent = "Could not export image. Please try again.";
        }
      });

      emailCoachBtn.addEventListener("click", () => {
        const lines = DAYS.flatMap((day) => {
          const priorities = weekState[day] || [];
          if (!priorities.length) {
            return [`${day}:`, "- (No priorities selected)", ""];
          }

          return [
            `${day}:`,
            ...priorities.map((item) => `- ${item.custom ? "Custom: " : ""}${item.label}`),
            "",
          ];
        });

        const subject = encodeURIComponent("Founder Calendar Submission");
        const body = encodeURIComponent(lines.join("\n"));
        window.location.href = `mailto:tywadebusiness@gmail.com?subject=${subject}&body=${body}`;
      });

      render();
    </script>
  </body>
</html>
