<html lang="en">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Muli:wght@300;400;600;700&family=Museo+Moderno:wght@500;700&family=Raleway:wght@500;700;800&display=swap"
      rel="stylesheet"
    />
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              cc: {
                bg: "#f5f5f7",
                text: "#071f35",
                accent: "#77d770",
              },
            },
            fontFamily: {
              brand: ["Museo Moderno", "Raleway", "sans-serif"],
              heading: ["Raleway", "system-ui", "sans-serif"],
              body: ["Muli", "system-ui", "sans-serif"],
            },
          },
        },
      };
    </script>
    <link rel="stylesheet" href="./shared.css" />
    <script src="./shared-global-nav.js" defer></script>
  </head>
  <body class="min-h-screen bg-cc-bg text-cc-text font-body antialiased">
    <main class="mx-auto flex min-h-screen max-w-3xl flex-col items-center justify-center px-6 py-16 text-center">
      <img src="./Logo.png" alt="Chasing Change logo" class="mb-6 h-20 w-20 rounded-2xl bg-white/80 p-2 ring-1 ring-black/10" />
      <p class="font-brand text-sm tracking-[0.18em] text-cc-text/70">Chasing Change</p>
      <h1 class="mt-3 font-heading text-4xl font-extrabold">This page moved or no longer exists.</h1>
      <p class="mt-4 max-w-xl text-sm text-cc-text/75 sm:text-base">
        You may have followed an old link. Use one of the routes below to get back on track.
      </p>

      <div class="mt-8 flex flex-wrap items-center justify-center gap-3">
        <a href="./index.html" class="rounded-xl bg-cc-accent px-5 py-3 text-sm font-extrabold text-cc-text transition hover:brightness-95">Back to Homepage</a>
        <a href="./index.html" class="rounded-xl bg-white px-5 py-3 text-sm font-bold text-cc-text ring-1 ring-black/10 transition hover:bg-black/5">Go to Start Line</a>
      </div>

      <p id="redirectNotice" class="mt-6 hidden rounded-xl bg-white/80 px-4 py-2 text-sm ring-1 ring-black/10"></p>
    </main>

    <script>
      (function () {
        const redirects = {
          "/": "./index.html",
          "/field-guide/fix-your-focus.html": "./index.html",
          "/field-guide/56-hour-sleep-protocol.html": "./index.html",
          "/field-guide/winning-the-back-to-work-war.html": "./index.html",
          "/field-guide/circle-of-influence.html": "./index.html",
          "/field-guide/millionaires-calendar.html": "./index.html",
          "/meal-plan/tool.html": "./PhysiqueLedger/index.html",
          "/meal-plan/index.html": "./PhysiqueLedger/index.html"
        };

        const notice = document.getElementById("redirectNotice");
        const path = window.location.pathname.replace(/\/+$/, "") || "/";
        const mapped = redirects[path];
        if (!mapped) return;

        notice.hidden = false;
        notice.textContent = "Redirecting you to the best available page...";
        window.setTimeout(() => {
          window.location.replace(mapped);
        }, 900);
      })();
    </script>
  
    <footer class="w-full px-5 pb-5 sm:px-8">
      <p class="text-center text-xs text-cc-text/70 sm:text-sm">© 2026 Chasing Change — 1% better every day.</p>
    </footer>

  </body>
</html>
