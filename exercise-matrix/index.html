<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercise Matrix | Chasing Change</title>
    <meta name="description" content="Browse the Chasing Change Exercise Matrix with muscle and equipment filters." />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../shared-admin.js" defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Muli:wght@300;400;600;700&family=Museo+Moderno:wght@500;700&family=Raleway:wght@500;700;800&display=swap" rel="stylesheet" />
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              cc: { text: "#071f35", bg: "#f5f5f7", accent: "#77d770", card: "#ffffff" },
            },
            fontFamily: {
              body: ["Muli", "system-ui", "sans-serif"],
              heading: ["Raleway", "system-ui", "sans-serif"],
              brand: ["Museo Moderno", "Raleway", "sans-serif"],
            },
          },
        },
      };
    </script>
    <link rel="stylesheet" href="../shared.css" />
    <script src="./data.js"></script>
  </head>
  <body class="min-h-screen bg-cc-bg text-cc-text font-body">
    <main data-admin-edit-root class="max-w-6xl mx-auto px-4 sm:px-6 py-8 sm:py-10">
      <header class="rounded-3xl overflow-hidden ring-1 ring-black/5 shadow-neon bg-white">
        <div class="relative p-6 sm:p-10">
          <div class="absolute -top-24 -right-24 w-72 h-72 rounded-full bg-cc-accent/20 blur-3xl"></div>
          <div class="relative">
            <div class="flex flex-wrap items-start justify-between gap-4">
              <div class="flex items-center gap-3">
              <img src="../Logo.png" alt="Chasing Change logo" class="w-10 h-10 sm:w-12 sm:h-12 rounded-xl ring-1 ring-black/10 bg-white/70 p-1" />
              <h1 class="text-4xl sm:text-5xl font-extrabold font-brand leading-tight">Chasing Change</h1>
              </div>
              <a href="../index.html" class="relative min-w-[220px] rounded-2xl border border-white/55 bg-gradient-to-br from-white/45 to-white/25 px-5 py-4 text-cc-text shadow-[inset_0_1px_0_rgba(255,255,255,0.55),0_16px_34px_rgba(7,31,53,0.16)] backdrop-blur-md transition hover:-translate-y-0.5 hover:shadow-[inset_0_1px_0_rgba(255,255,255,0.6),0_22px_40px_rgba(7,31,53,0.2)]">
                <span class="block font-heading text-base sm:text-lg font-extrabold uppercase tracking-[0.03em]">Start Line</span>
                <span class="mt-1 block text-sm font-bold text-cc-text/75">(Home)</span>
              </a>
            </div>
            <p class="mt-3 text-xl sm:text-2xl font-bold font-heading">Pursuing Peace, Pursuing Purpose</p>
            <div class="mt-5 inline-flex items-center rounded-2xl bg-cc-text/5 px-4 py-3 ring-1 ring-black/10">
              <h2 class="text-lg sm:text-xl font-extrabold font-heading">Exercise Matrix</h2>
            </div>
            <p class="mt-3 max-w-3xl text-sm sm:text-base opacity-80">Search and filter your exercise library by <strong>primary muscle</strong> and <strong>equipment</strong>.</p>
          </div>
        </div>
        <div class="mt-5 flex flex-wrap gap-3">
          <a href="../preparing-route/index.html" class="inline-flex rounded-xl bg-cc-accent px-4 py-2 text-sm font-bold hover:brightness-95">← Back to Preparing the Route</a>
          <a href="../index.html" class="inline-flex rounded-xl bg-white px-4 py-2 text-sm font-bold ring-1 ring-black/10 hover:bg-black/5">Home</a>
        </div>
      </header>

      <section class="mt-6 rounded-3xl bg-white p-5 sm:p-6 ring-1 ring-black/10 shadow-lg">
        <div class="grid gap-3 sm:grid-cols-3">
          <label class="grid gap-1 text-sm font-semibold">
            Search exercise
            <input id="searchInput" type="text" placeholder="e.g. bench, row, curl" class="rounded-xl border border-black/15 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-cc-accent" />
          </label>
          <label class="grid gap-1 text-sm font-semibold">
            Primary muscle
            <select id="muscleFilter" class="rounded-xl border border-black/15 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-cc-accent">
              <option value="all">All muscles</option>
            </select>
          </label>
          <label class="grid gap-1 text-sm font-semibold">
            Equipment
            <select id="equipmentFilter" class="rounded-xl border border-black/15 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-cc-accent">
              <option value="all">All equipment</option>
            </select>
          </label>
        </div>
        <p id="resultCount" class="mt-4 text-sm font-semibold opacity-75"></p>

        <div class="mt-4 overflow-hidden rounded-2xl border border-black/10">
          <table class="w-full text-sm">
            <thead class="bg-cc-text text-white text-left">
              <tr>
                <th class="px-4 py-3">Exercise</th>
                <th class="px-4 py-3">Primary Muscle</th>
                <th class="px-4 py-3">Equipment</th>
              </tr>
            </thead>
            <tbody id="matrixBody" class="bg-white"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script>
      const DATA = window.EXERCISE_MATRIX || [];
      const searchInput = document.getElementById("searchInput");
      const muscleFilter = document.getElementById("muscleFilter");
      const equipmentFilter = document.getElementById("equipmentFilter");
      const matrixBody = document.getElementById("matrixBody");
      const resultCount = document.getElementById("resultCount");

      function uniqueValues(key) {
        return [...new Set(DATA.map((item) => item[key]).filter(Boolean))].sort((a, b) => a.localeCompare(b));
      }

      function hydrateFilters() {
        uniqueValues("primaryMuscle").forEach((value) => {
          const option = document.createElement("option");
          option.value = value;
          option.textContent = value;
          muscleFilter.appendChild(option);
        });

        uniqueValues("equipment").forEach((value) => {
          const option = document.createElement("option");
          option.value = value;
          option.textContent = value;
          equipmentFilter.appendChild(option);
        });
      }

      function render() {
        const search = searchInput.value.trim().toLowerCase();
        const muscle = muscleFilter.value;
        const equipment = equipmentFilter.value;

        const filtered = DATA.filter((row) => {
          const matchSearch = !search || row.name.toLowerCase().includes(search);
          const matchMuscle = muscle === "all" || row.primaryMuscle === muscle;
          const matchEquipment = equipment === "all" || row.equipment === equipment;
          return matchSearch && matchMuscle && matchEquipment;
        });

        resultCount.textContent = `${filtered.length} exercise${filtered.length === 1 ? "" : "s"} shown`;

        matrixBody.innerHTML = filtered
          .map(
            (row) => `
              <tr class="border-t border-black/10 odd:bg-[#f9fafb]">
                <td class="px-4 py-3 font-semibold">${row.name}</td>
                <td class="px-4 py-3">${row.primaryMuscle}</td>
                <td class="px-4 py-3">${row.equipment}</td>
              </tr>
            `
          )
          .join("");

        if (!filtered.length) {
          matrixBody.innerHTML = '<tr><td colspan="3" class="px-4 py-8 text-center text-sm opacity-70">No exercises match your current filters.</td></tr>';
        }
      }

      hydrateFilters();
      render();
      [searchInput, muscleFilter, equipmentFilter].forEach((el) => el.addEventListener("input", render));
    </script>
  </body>
</html>
