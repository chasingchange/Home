<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercise Matrix | Chasing Change</title>
    <meta name="description" content="Browse the Chasing Change Exercise Matrix and Split Sculptor exercise database with searchable movement metadata." />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../shared-admin.js" defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Muli:wght@300;400;600;700&family=Museo+Moderno:wght@500;700&family=Raleway:wght@500;700;800&display=swap" rel="stylesheet" />
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              cc: { text: "#071f35", bg: "#f5f5f7", accent: "#77d770", card: "#ffffff" },
            },
            fontFamily: {
              body: ["Muli", "system-ui", "sans-serif"],
              heading: ["Raleway", "system-ui", "sans-serif"],
              brand: ["Museo Moderno", "Raleway", "sans-serif"],
            },
          },
        },
      };
    </script>
    <link rel="stylesheet" href="../shared.css" />
    <script src="../shared-global-nav.js" defer></script>
    <script src="../shared-session.js"></script>
    <script src="./data.js"></script>
  </head>
  <body class="min-h-screen bg-cc-bg text-cc-text font-body cc-page">
    <main data-admin-edit-root class="max-w-6xl mx-auto px-4 sm:px-6 py-8 sm:py-10">
      <header class="mb-5 sm:mb-6">
        <p class="cc-page-title">Exercise Matrix</p>
        <p class="mt-2 text-sm text-cc-text/75 text-center">Body Core Tool • Split Sculptor Exercise Database</p>
        <div class="mt-3 flex flex-wrap items-center justify-center gap-2">
          <a href="../index.html" class="cc-signature-nav">← Back to Tool Database</a>
          <a href="../split-sculptor/index.html" class="cc-signature-nav">Open Split Sculptor</a>
          <a href="https://tally.so/r/w5JXKE" target="_blank" rel="noreferrer" class="cc-title-coaching">Want this dialed in? Apply for coaching →</a>
        </div>
      </header>

      <section class="mt-6 rounded-3xl bg-white p-5 sm:p-6 ring-1 ring-black/10 shadow-lg">
        <div class="grid gap-3 sm:grid-cols-4">
          <label class="grid gap-1 text-sm font-semibold">
            Search exercise
            <input id="searchInput" type="text" placeholder="e.g. incline press, hinge, unilateral" class="rounded-xl border border-black/15 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-cc-accent" />
          </label>
          <label class="grid gap-1 text-sm font-semibold">
            Primary muscle
            <select id="muscleFilter" class="rounded-xl border border-black/15 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-cc-accent">
              <option value="all">All muscles</option>
            </select>
          </label>
          <label class="grid gap-1 text-sm font-semibold">
            Equipment
            <select id="equipmentFilter" class="rounded-xl border border-black/15 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-cc-accent">
              <option value="all">All equipment</option>
            </select>
          </label>
          <label class="grid gap-1 text-sm font-semibold">
            Movement type
            <select id="movementTypeFilter" class="rounded-xl border border-black/15 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-cc-accent">
              <option value="all">All types</option>
            </select>
          </label>
        </div>
        <p id="resultCount" class="mt-4 text-sm font-semibold opacity-75"></p>

        <div class="mt-4 overflow-hidden rounded-2xl border border-black/10">
          <table class="w-full text-sm">
            <thead class="bg-cc-text text-white text-left">
              <tr>
                <th class="px-4 py-3">Exercise</th>
                <th class="px-4 py-3">Primary Muscle</th>
                <th class="px-4 py-3">Movement Type</th>
                <th class="px-4 py-3">Pattern / Angle</th>
                <th class="px-4 py-3">Equipment</th>
              </tr>
            </thead>
            <tbody id="matrixBody" class="bg-white"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script>
      const DATA = window.EXERCISE_MATRIX || [];
      const searchInput = document.getElementById("searchInput");
      const muscleFilter = document.getElementById("muscleFilter");
      const equipmentFilter = document.getElementById("equipmentFilter");
      const movementTypeFilter = document.getElementById("movementTypeFilter");
      const matrixBody = document.getElementById("matrixBody");
      const resultCount = document.getElementById("resultCount");
      const pageLoginStatus = document.getElementById("pageLoginStatus");

      function uniqueValues(key) {
        return [...new Set(DATA.map((item) => item[key]).filter(Boolean))].sort((a, b) => a.localeCompare(b));
      }

      function hydrateFilters() {
        uniqueValues("primaryMuscle").forEach((value) => {
          const option = document.createElement("option");
          option.value = value;
          option.textContent = value;
          muscleFilter.appendChild(option);
        });

        uniqueValues("equipment").forEach((value) => {
          const option = document.createElement("option");
          option.value = value;
          option.textContent = value;
          equipmentFilter.appendChild(option);
        });

        uniqueValues("movementType").forEach((value) => {
          const option = document.createElement("option");
          option.value = value;
          option.textContent = value;
          movementTypeFilter.appendChild(option);
        });
      }

      function render() {
        const search = searchInput.value.trim().toLowerCase();
        const muscle = muscleFilter.value;
        const equipment = equipmentFilter.value;
        const movementType = movementTypeFilter.value;

        const filtered = DATA.filter((row) => {
          const searchBlob = [
            row.name,
            ...(row.aliases || []),
            row.primaryMuscle,
            ...(row.secondaryMuscles || []),
            row.movementPattern,
            row.angle,
            row.category,
            row.equipment,
            ...(row.tags || [])
          ].join(" ").toLowerCase();
          const matchSearch = !search || searchBlob.includes(search);
          const matchMuscle = muscle === "all" || row.primaryMuscle === muscle;
          const matchEquipment = equipment === "all" || row.equipment === equipment;
          const matchMovementType = movementType === "all" || row.movementType === movementType;
          return matchSearch && matchMuscle && matchEquipment && matchMovementType;
        });

        resultCount.textContent = `${filtered.length} exercise${filtered.length === 1 ? "" : "s"} shown`;

        matrixBody.innerHTML = filtered
          .map(
            (row) => `
              <tr class="border-t border-black/10 odd:bg-[#f9fafb] align-top">
                <td class="px-4 py-3 font-semibold">${row.name}<div class="text-xs opacity-70 mt-1">${(row.aliases || []).join(', ') || '—'}</div></td>
                <td class="px-4 py-3">${row.primaryMuscle}<div class="text-xs opacity-70 mt-1">${(row.secondaryMuscles || []).join(', ') || '—'}</div></td>
                <td class="px-4 py-3">${row.movementType}<div class="text-xs opacity-70 mt-1 uppercase">${row.category || 'n/a'}</div></td>
                <td class="px-4 py-3">${row.movementPattern || '—'}<div class="text-xs opacity-70 mt-1">${row.angle || '—'} · ${row.laterality || '—'}</div></td>
                <td class="px-4 py-3">${row.equipment}</td>
              </tr>
            `
          )
          .join("");

        if (!filtered.length) {
          matrixBody.innerHTML = '<tr><td colspan="5" class="px-4 py-8 text-center text-sm opacity-70">No exercises match your current filters.</td></tr>';
        }
      }

      hydrateFilters();
      if (pageLoginStatus && window.ChasingChangeSession?.getCurrentDisplayName) {
        const displayName = window.ChasingChangeSession.getCurrentDisplayName();
        pageLoginStatus.textContent = displayName ? `Welcome Back To The Race, ${displayName}` : "Not Logged In";
      }
      render();
      [searchInput, muscleFilter, equipmentFilter, movementTypeFilter].forEach((el) => el.addEventListener("input", render));
    </script>
  
    <footer class="w-full px-5 pb-5 sm:px-8">
      <p class="text-center text-xs text-cc-text/70 sm:text-sm">© 2026 Chasing Change — 1% better every day.</p>
    </footer>

  </body>
</html>
