<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chasing Change — Testimonials</title>
    <meta name="description" content="Client testimonials for Chasing Change coaching." />

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="./shared-admin.js" defer></script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Muli:wght@300;400;600;700&family=Museo+Moderno:wght@500;700&family=Raleway:wght@500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./shared.css" />
    <script src="./shared-session.js"></script>
    <script src="./shared-testimonials.js"></script>

    <style>
      .testimonial-card {
        background: #ffffff;
        border: 1px solid rgba(7, 31, 53, 0.1);
        border-radius: 1rem;
        box-shadow: 0 8px 24px rgba(7, 31, 53, 0.06);
        transition: border-color 0.25s ease, box-shadow 0.25s ease, background-color 0.25s ease;
      }

      .testimonial-content {
        height: 0;
        overflow: hidden;
        opacity: 0;
        margin-top: 0.35rem;
        border-top: 0 solid transparent;
        transition: height 0.35s ease, opacity 0.25s ease, border-color 0.25s ease;
      }

      .testimonial-card.is-open .testimonial-content {
        opacity: 1;
        margin-top: 0.85rem;
        border-top: 1px solid rgba(7, 31, 53, 0.12);
      }

      .testimonial-card.is-open {
        border-color: rgba(119, 215, 112, 0.9);
        box-shadow: 0 12px 28px rgba(7, 31, 53, 0.08);
      }

      .testimonial-copy {
        padding-top: 0.8rem;
      }

      .testimonial-trigger svg {
        transition: transform 0.25s ease;
      }

      .testimonial-card.is-open .testimonial-trigger svg {
        transform: rotate(180deg);
      }
    </style>

    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              cc: { text: "#071f35", bg: "#f5f5f7", outline: "#77d770", card: "#ffffff" },
            },
            fontFamily: {
              body: ["Muli", "Mulish", "system-ui", "-apple-system", "BlinkMacSystemFont", "Segoe UI", "sans-serif"],
              heading: ["Raleway", "system-ui", "-apple-system", "BlinkMacSystemFont", "Segoe UI", "sans-serif"],
              brand: ["Museo Moderno", "Raleway", "sans-serif"],
            },
            boxShadow: {
              soft: "0 10px 30px rgba(7,31,53,0.10)",
              neon: "0 24px 80px rgba(119,215,112,0.30)",
            },
          },
        },
      };
    </script>
  </head>

  <body class="min-h-screen bg-cc-bg text-cc-text font-body cc-page">
    <div class="relative max-w-6xl mx-auto px-4 sm:px-6 pt-4 pb-6 sm:pt-5 sm:pb-7">
      <div class="absolute inset-0 -z-10 pointer-events-none">
        <div class="absolute -top-16 right-8 w-72 h-72 bg-cc-outline/30 blur-3xl rounded-full"></div>
        <div class="absolute top-40 -left-12 w-72 h-72 bg-cc-text/15 blur-3xl rounded-full"></div>
      </div>

      <header class="cc-global-header mb-4 sm:mb-5">
        <nav class="cc-global-nav" aria-label="Global navigation">
          <a href="./index.html" aria-label="Go to Start Line search page" class="cc-nav-logo">
            <img src="./Logo.png" alt="Chasing Change logo" />
          </a>
          <button type="button" class="cc-mobile-toggle" aria-expanded="false" aria-controls="globalNavLinks">☰</button>
          <div id="globalNavLinks" class="cc-global-nav-links">
            <a href="./testimonials.html" class="cc-signature-nav">Testimonials</a>
            <a href="./about/index.html" class="cc-signature-nav">About</a>
            <a href="https://tally.so/r/w5JXKE" data-apply-coaching class="cc-signature-nav">Apply for Coaching</a>
            <a href="./contact/index.html" class="cc-signature-nav">Contact</a>
          </div>
        </nav>
        <div class="cc-global-title">
          <h1 class="cc-global-title-name">Chasing Change</h1>
          <p class="cc-global-title-subline">Pursuing Peace, Pursuing Purpose</p>
        </div>
      </header>

      <main data-admin-edit-root>
        <section class="rounded-3xl bg-white/90 ring-1 ring-black/10 p-5 sm:p-7 shadow-soft">
          <div class="mt-4 rounded-2xl border border-cc-outline/50 bg-cc-outline/10 p-4 sm:p-5">
            <p class="text-xs sm:text-sm font-semibold uppercase tracking-[0.14em] text-cc-text/70">Ready to Chase Change?</p>
            <a href="https://calendly.com/tywadebusiness/chasing-change" target="_blank" rel="noopener noreferrer" class="mt-2 inline-flex rounded-xl border border-cc-outline/60 bg-cc-outline/90 px-4 py-2 text-sm font-extrabold text-cc-text hover:bg-cc-outline transition">Book a Free Transformation Call</a>
          </div>

          <h2 class="mt-7 font-heading text-3xl sm:text-4xl font-extrabold tracking-tight">Testimonials</h2>
          <p class="mt-2 text-sm sm:text-base text-cc-text/70">Click a name to expand and read the full testimonial.</p>

          <div id="testimonialAdminPanel" class="hidden mt-4 rounded-2xl bg-cc-bg ring-1 ring-black/10 p-4">
            <h3 class="text-lg font-extrabold font-heading">Add testimonial</h3>
            <form id="testimonialAdminForm" class="mt-3 grid gap-2">
              <input id="adminName" type="text" class="rounded-xl border border-black/10 px-3 py-2 text-sm" placeholder="Name" required />
              <input id="adminYear" type="text" class="rounded-xl border border-black/10 px-3 py-2 text-sm" placeholder="Year (e.g. 2026)" required />
              <textarea id="adminBody" rows="5" class="rounded-xl border border-black/10 px-3 py-2 text-sm" placeholder="Paragraphs separated by blank lines" required></textarea>
              <button type="submit" class="rounded-xl bg-cc-outline px-4 py-2 text-sm font-bold text-cc-text">Add testimonial</button>
            </form>
          </div>
          <h3 class="mt-6 text-xs sm:text-sm font-heading font-bold uppercase tracking-[0.2em] text-cc-text/60">2025 Cohort</h3>
          <div id="testimonialGrid" class="mt-3 grid gap-4 sm:grid-cols-2 xl:grid-cols-3 items-start auto-rows-auto">
          </div>
        </section>

      <p class="mt-5 text-center text-xs sm:text-sm opacity-70">© 2026 Chasing Change — 1% better every day.</p>

      </main>
    </div>

    <script>

      const testimonialGrid = document.getElementById("testimonialGrid");

      const createTestimonialCard = (testimonial) => {
        const article = document.createElement("article");
        article.className =
          "testimonial-card group relative p-5 sm:p-6";

        const trigger = document.createElement("button");
        trigger.type = "button";
        trigger.className =
          "testimonial-trigger flex w-full items-start justify-between gap-4 text-left focus:outline-none focus-visible:ring-2 focus-visible:ring-cc-outline/90 rounded-lg";
        trigger.setAttribute("aria-expanded", "false");

        const heading = document.createElement("h3");
        heading.className = "text-base sm:text-lg font-heading font-extrabold leading-tight";
        heading.append(document.createTextNode(testimonial.name));
        const cohort = document.createElement("span");
        cohort.className = "mt-2 block text-[11px] sm:text-xs font-semibold uppercase tracking-[0.16em] text-cc-text/60";
        cohort.textContent = `${testimonial.year} Cohort`;
        heading.appendChild(cohort);

        const indicator = document.createElement("span");
        indicator.className = "mt-1 inline-flex items-center gap-2 text-xs sm:text-sm font-semibold text-cc-text/65";
        indicator.innerHTML =
          '<span>Read more</span><svg aria-hidden="true" class="h-4 w-4" viewBox="0 0 20 20" fill="none"><path d="M5 7.5L10 12.5L15 7.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>';

        const content = document.createElement("div");
        content.className = "testimonial-content text-sm sm:text-base leading-relaxed text-cc-text/90";
        content.setAttribute("aria-hidden", "true");

        const copy = document.createElement("div");
        copy.className = "testimonial-copy";

        testimonial.paragraphs.forEach((paragraph, index) => {
          const p = document.createElement("p");
          p.className = index === 0 ? "" : "mt-3";
          p.textContent = paragraph;
          copy.appendChild(p);
        });

        content.appendChild(copy);
        trigger.appendChild(heading);
        trigger.appendChild(indicator);
        article.appendChild(trigger);
        article.appendChild(content);
        return article;
      };

      const savedTestimonials = window.CCTestimonialsStore?.load() || [];
      savedTestimonials.forEach((item) => {
        if (item?.name && item?.year && Array.isArray(item?.paragraphs) && item.paragraphs.length) {
          testimonialGrid.appendChild(createTestimonialCard(item));
        }
      });

      const bindCardInteractions = () => {
        const testimonialCards = document.querySelectorAll(".testimonial-card");
        const closeCard = (card) => {
          const content = card.querySelector(".testimonial-content");
          const copy = card.querySelector(".testimonial-copy");
          const trigger = card.querySelector(".testimonial-trigger");
          if (!content || !copy || !trigger) return;
          content.style.height = `${copy.scrollHeight}px`;
          requestAnimationFrame(() => {
            card.classList.remove("is-open");
            trigger.setAttribute("aria-expanded", "false");
            content.setAttribute("aria-hidden", "true");
            content.style.height = "0px";
          });
        };

        const openCard = (card) => {
          const content = card.querySelector(".testimonial-content");
          const copy = card.querySelector(".testimonial-copy");
          const trigger = card.querySelector(".testimonial-trigger");
          if (!content || !copy || !trigger) return;
          card.classList.add("is-open");
          trigger.setAttribute("aria-expanded", "true");
          content.setAttribute("aria-hidden", "false");
          content.style.height = `${copy.scrollHeight}px`;
        };

        const syncOpenHeights = () => {
          testimonialCards.forEach((card) => {
            if (!card.classList.contains("is-open")) return;
            const content = card.querySelector(".testimonial-content");
            const copy = card.querySelector(".testimonial-copy");
            if (!content || !copy) return;
            content.style.height = `${copy.scrollHeight}px`;
          });
        };

        testimonialCards.forEach((card) => {
          const trigger = card.querySelector(".testimonial-trigger");
          if (!trigger) return;

          trigger.addEventListener("click", () => {
            const isOpen = card.classList.contains("is-open");
            testimonialCards.forEach((item) => {
              if (item !== card && item.classList.contains("is-open")) {
                closeCard(item);
              }
            });
            if (isOpen) {
              closeCard(card);
            } else {
              openCard(card);
            }
          });

          const content = card.querySelector(".testimonial-content");
          content?.addEventListener("transitionend", (event) => {
            if (event.propertyName !== "height" || !card.classList.contains("is-open")) return;
            const copy = card.querySelector(".testimonial-copy");
            if (!copy) return;
            const measuredHeight = copy.scrollHeight;
            if (measuredHeight > 0) {
              content.style.height = `${measuredHeight}px`;
            }
          });
        });
        window.addEventListener("resize", syncOpenHeights);
        syncOpenHeights();
      };


      const testimonialAdminPanel = document.getElementById("testimonialAdminPanel");
      const testimonialAdminForm = document.getElementById("testimonialAdminForm");
      const isAdminUnlocked = localStorage.getItem("ccAdminUnlocked") === "true";
      testimonialAdminPanel?.classList.toggle("hidden", !isAdminUnlocked);

      testimonialAdminForm?.addEventListener("submit", (event) => {
        event.preventDefault();
        const name = document.getElementById("adminName").value.trim();
        const year = document.getElementById("adminYear").value.trim();
        const paragraphs = document.getElementById("adminBody").value
          .split(/\n\s*\n/g)
          .map((item) => item.trim())
          .filter(Boolean);
        if (!name || !year || !paragraphs.length) return;

        const next = window.CCTestimonialsStore?.load() || [];
        next.push({ name, year, paragraphs });
        window.CCTestimonialsStore?.save(next);
        location.reload();
      });

      bindCardInteractions();
    </script>
      <script src="./shared-global-nav.js"></script>
  </body>
</html>
