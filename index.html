  <head>

    <title>Chasing Change | Front Door Search</title>

    <!-- Tailwind CDN keeps this static-site friendly for GitHub Pages -->

    <!-- Brand fonts -->

    <script>
      tailwind.config = {

  </head>
  <body class="min-h-screen bg-cc-bg text-cc-text font-body antialiased cc-page">
    <main class="mx-auto flex min-h-screen w-full max-w-4xl flex-col items-center justify-start px-5 pt-4 pb-6 sm:px-8">
      <header class="mb-10 w-full border-b border-black/10 pb-4">
        <nav id="coreTopBar" aria-label="Primary and tool navigation" class="flex flex-wrap items-center justify-center gap-x-5 gap-y-2 text-[12px] font-semibold tracking-[0.08em] text-cc-text/70">
          <a href="./index.html" class="text-sm font-semibold tracking-normal text-cc-text">Start Line</a>
          <a href="./testimonials.html" class="text-sm font-medium tracking-normal hover:text-cc-text transition">Testimonials</a>

      <!-- Minimal brand label -->

      <section class="w-full text-center" aria-labelledby="hero-heading">
        <!-- EDIT HERO COPY HERE -->
        <h1 id="hero-heading" class="font-heading text-4xl font-extrabold tracking-tight sm:text-5xl">What are you chasing?</h1>
        <p class="mx-auto mt-4 max-w-2xl text-sm text-cc-text/70 sm:text-base">
          Start with a goal, problem, or question. We’ll point you in the right direction.
        </p>

        <div class="mx-auto mt-10 w-full max-w-3xl text-left">
          <label for="searchInput" class="sr-only">Search Chasing Change resources</label>
          <div
            class="flex items-center rounded-full bg-cc-panel px-3 py-2 shadow-soft ring-1 ring-black/10 transition focus-within:ring-2 focus-within:ring-cc-accent"
          >
            <!-- Option B: fixed prefix label for premium clarity -->
            <span class="shrink-0 whitespace-nowrap rounded-full bg-cc-text/5 px-4 py-2 text-sm font-semibold text-cc-text/75 sm:text-base">I’m Chasing</span>
            <input
              id="searchInput"
              type="search"
              autocomplete="off"
              spellcheck="false"
              placeholder="fat loss, better sleep, career clarity, routine..."
              class="w-full bg-transparent px-3 py-2 text-base text-cc-text placeholder:text-cc-text/45 focus:outline-none"
              aria-describedby="searchHelp"
            />
          </div>
          <p id="searchHelp" class="mt-3 text-xs text-cc-text/55">Type naturally. We’ll recommend the best next resource.</p>

          <!-- Suggestions (shown only while search is empty) -->
          <div id="suggestions" class="mt-4 flex flex-wrap gap-2" role="list" aria-label="Suggested searches"></div>

          <!-- Dynamic result panel -->
          <div id="resultsPanel" class="mt-4 hidden rounded-2xl bg-cc-panel p-2 shadow-soft ring-1 ring-black/10" role="region" aria-live="polite" aria-label="Search results"></div>
        </div>

      </section>

    </main>
    <footer class="w-full px-5 pb-5 sm:px-8">
      <p class="text-center text-xs text-cc-text/70 sm:text-sm">© 2026 Chasing Change — 1% better every day.</p>
    </footer>

    <script>

      // ==============================

      const suggestedSearches = ["Body", "Career", "Sleep", "Focus", "Routine"];

      // 3) EDIT / EXPAND RESOURCE LIBRARY HERE
      // status: "live" or "coming_soon"
      const resources = [

        {

        },
        {

          url: "./exercise-matrix/index.html",

        },
        {
          id: "equipment-picks",

          type: "Resource Hub",
          core: "Body",

          url: "./equipment/index.html",
          status: "live",

          triggers: ["show me equipment", "gear recommendations", "body core equipment", "running gear"],

          priority: 8,
        },
        {
          id: "one-rep-max-calculator",
          title: "1 Rep Max Calculator",
          type: "Calculator",
          core: "Body",
          description: "Estimate your current 1RM and compare against strength standards by lift and bodyweight.",
          url: "./1RM Calculator/Index.html",
          status: "live",
          tags: ["body", "strength", "lifting"],
          keywords: ["1rm", "one rep max", "strength", "bench", "squat", "deadlift"],
          triggers: ["im chasing strength", "calculate my one rep max", "im chasing a better body"],
          featured: true,
          priority: 9,
        },
        {

          title: "5Ps Career Fit Calculator",
          type: "Calculator",

          url: "./career-core/index.html",

        {

          priority: 8,
        },
        {
          id: "gagging-the-critic",
          title: "Gagging the Critic",
          type: "Framework",
          core: "Mind",
          description: "Challenge self-sabotage loops and build a stronger inner operating voice.",
          url: "./gagging-the-critic/index.html",
          status: "live",
          tags: ["mind", "confidence"],
          keywords: ["self doubt", "inner critic", "peace", "anxiety"],
          triggers: ["im chasing peace", "i feel stuck"],
          featured: false,
          priority: 6,
        },
        {
          id: "56-hour-sleep-protocol",
          title: "The 56-Hour Sleep Protocol",
          type: "Protocol",
          core: "Soul",
          description: "Simple system to stabilize sleep, reduce stress load, and restore recovery rhythm.",
          url: "./preparing-route/index.html",
          status: "coming_soon",
          tags: ["sleep", "recovery", "stress"],
          keywords: ["better sleep", "tired", "rest", "peace", "recovery"],
          triggers: ["im chasing better sleep", "im chasing peace"],
          featured: true,
          priority: 8,
        },
        {
          id: "winning-the-back-to-work-war",
          title: "Winning The Back To Work War",
          type: "Guide",
          core: "Career",
          description: "A return-to-work strategy for momentum, boundaries, and output consistency.",
          url: "./preparing-route/index.html",
          status: "coming_soon",
          tags: ["career", "work", "consistency"],
          keywords: ["job", "work", "focus", "schedule", "clarity"],
          triggers: ["im chasing routine", "im chasing consistency"],
          featured: false,
          priority: 7,
        },
        {
          id: "circle-of-influence",
          title: "Circle of Influence",
          type: "Framework",
          core: "Life",
          description: "Sort what you can control vs. what drains you, then reallocate your energy.",
          url: "./preparing-route/index.html",
          status: "coming_soon",
          tags: ["life", "clarity", "peace"],
          keywords: ["stress", "overwhelmed", "reset", "stuck"],
          triggers: ["get my life together", "help me reset"],
          featured: false,
          priority: 7,
        },
        {
          id: "millionaires-calendar",
          title: "The Millionaire’s Calendar",
          type: "Planner",
          core: "Life",
          description: "Plan high-leverage weeks around priorities, deep work, and non-negotiables.",
          url: "./preparing-route/index.html",
          status: "coming_soon",
          tags: ["life", "focus", "planning"],
          keywords: ["routine", "schedule", "consistency", "money", "calendar"],
          triggers: ["im chasing a routine", "im chasing consistency"],
          featured: true,
          priority: 8,
        },
        {
          id: "coaching-application",
          title: "Coaching Application",
          type: "Application",
          core: "Career",
          description: "Apply for direct coaching support and personalized strategy.",
          url: "./apply-for-coaching/index.html",
          status: "live",
          tags: ["coaching", "support"],
          keywords: ["help", "mentor", "coach", "apply"],
          triggers: ["i need help", "im stuck"],
          featured: false,
          priority: 6,
        },
      ];

      // ==============================
      // SEARCH ENGINE (MODULAR + EXPANDABLE)
      // ==============================

      const MAX_RESULTS = 6;

      const searchInput = document.getElementById("searchInput");
      const resultsPanel = document.getElementById("resultsPanel");
      const suggestionsContainer = document.getElementById("suggestions");
      const coreTopBar = document.getElementById("coreTopBar");
      const coreMegaMenu = document.getElementById("coreMegaMenu");
      const coreMegaMenuTitle = document.getElementById("coreMegaMenuTitle");
      const coreMegaMenuItems = document.getElementById("coreMegaMenuItems");

      function normalizeText(value = "") {
        return value
          .toLowerCase()
          .trim()
          .normalize("NFD")
          .replace(/[\u0300-\u036f]/g, "")
          .replace(/[^a-z0-9\s]/g, " ")
          .replace(/\s+/g, " ")
          .trim();
      }

      function tokenize(value = "") {
        return normalizeText(value)
          .split(" ")
          .filter(Boolean);
      }

      function includesPhrase(haystack, needle) {
        return haystack.includes(normalizeText(needle));
      }

      function scoreResource(resource, normalizedQuery, queryTokens) {
        if (!normalizedQuery) return 0;

        let score = 0;
        const title = normalizeText(resource.title);
        const description = normalizeText(resource.description);
        const triggers = resource.triggers.map(normalizeText);
        const tags = resource.tags.map(normalizeText);
        const keywords = resource.keywords.map(normalizeText);

        // 1) Exact title / strong title match
        if (title === normalizedQuery) score += 140;
        if (title.startsWith(normalizedQuery)) score += 70;
        if (title.includes(normalizedQuery)) score += 45;

        // 2) Trigger phrase match
        triggers.forEach((trigger) => {
          if (trigger === normalizedQuery) score += 110;
          else if (trigger.includes(normalizedQuery) || normalizedQuery.includes(trigger)) score += 60;
        });

        // 3) Tag / keyword matching
        queryTokens.forEach((token) => {
          if (tags.some((tag) => tag.includes(token))) score += 24;
          if (keywords.some((keyword) => keyword.includes(token))) score += 20;
          if (title.includes(token)) score += 18;
        });

        // Broad-intent routing boosts
        const intentBoosts = [
          { terms: ["body", "muscle", "fat loss", "calories", "nutrition"], core: "body", bonus: 16 },
          { terms: ["job", "career", "work", "clarity", "money"], core: "career", bonus: 16 },
          { terms: ["focus", "overwhelmed", "routine", "schedule", "consistency"], core: "mind", bonus: 16 },
          { terms: ["sleep", "stress", "peace"], core: "soul", bonus: 16 },
        ];

        intentBoosts.forEach((intent) => {
          if (intent.terms.some((term) => includesPhrase(normalizedQuery, term)) && normalizeText(resource.core) === intent.core) {
            score += intent.bonus;
          }
        });

        if (resource.featured) score += 4;
        score += resource.priority || 0;

        return score;
      }

      function searchResources(query) {
        const normalizedQuery = normalizeText(query);
        const queryTokens = tokenize(query);

        return resources
          .map((resource) => ({
            resource,
            score: scoreResource(resource, normalizedQuery, queryTokens),
          }))
          .filter((entry) => entry.score > 0)
          .sort((a, b) => b.score - a.score)
          .slice(0, MAX_RESULTS)
          .map((entry) => entry.resource);
      }

      function resultItemTemplate(resource) {
        const isLive = resource.status === "live";
        const ctaText = isLive ? (resource.type === "Calculator" || resource.type === "Tracker" ? "Open Tool" : "View Resource") : "Coming Soon";
        const statusBadge = isLive
          ? ""
          : '<span class="rounded-full bg-cc-text/10 px-2.5 py-1 text-[10px] font-bold uppercase tracking-wide text-cc-text/70">Coming Soon</span>';

        const cardInner = `
          <div class="flex items-start justify-between gap-3">
            <div>
              <p class="text-xs font-semibold uppercase tracking-[0.12em] text-cc-text/55">${resource.type}${resource.core ? ` • ${resource.core}` : ""}</p>
              <h3 class="mt-1 font-heading text-lg font-bold text-cc-text">${resource.title}</h3>
              <p class="mt-1 text-sm text-cc-text/75">${resource.description}</p>
            </div>
            ${statusBadge}
          </div>
          <p class="mt-3 text-sm font-semibold ${isLive ? "text-cc-text" : "text-cc-text/55"}">${ctaText}</p>
        `;

        if (!isLive) {
          return `
            <li>
              <div class="rounded-xl border border-black/5 bg-white/85 p-4">
                ${cardInner}
              </div>
            </li>
          `;
        }

        return `
          <li>
            <a href="${resource.url}" class="block rounded-xl border border-black/5 bg-white/85 p-4 transition hover:border-cc-accent/65 hover:bg-white focus:outline-none focus-visible:ring-2 focus-visible:ring-cc-accent">
              ${cardInner}
            </a>
          </li>
        `;
      }

      function renderResults(query) {
        const normalizedQuery = normalizeText(query);

        if (!normalizedQuery) {
          resultsPanel.classList.add("hidden");
          resultsPanel.innerHTML = "";
          renderSuggestions();
          return;
        }

        const matches = searchResources(query);
        suggestionsContainer.innerHTML = "";

        resultsPanel.classList.remove("hidden");

        if (!matches.length) {
          resultsPanel.innerHTML = `
            <div class="rounded-xl border border-dashed border-black/15 bg-white/75 p-5 text-center">
              <p class="font-heading text-base font-bold text-cc-text">No direct match yet.</p>
              <p class="mt-1 text-sm text-cc-text/70">Try a simpler phrase or head to Start Line.</p>
            </div>
          `;
          return;
        }

        resultsPanel.innerHTML = `<ul class="space-y-2">${matches.map(resultItemTemplate).join("")}</ul>`;
      }

      function renderSuggestions() {
        suggestionsContainer.innerHTML = suggestedSearches
          .map(
            (term) =>
              `<button type="button" class="rounded-full border border-black/10 bg-white/70 px-3 py-1.5 text-xs font-semibold text-cc-text/75 transition hover:border-cc-accent hover:bg-white focus:outline-none focus-visible:ring-2 focus-visible:ring-cc-accent" data-suggestion="${term}">${term}</button>`,
          )
          .join("");
      }

      function briefDescription(description = "") {
        return description.split(".")[0].trim();
      }

      function renderCoreMegaMenu(activeCore) {
        const coreMatches = resources
          .filter((resource) => normalizeText(resource.core) === normalizeText(activeCore))
          .sort((a, b) => a.title.localeCompare(b.title));

        if (!coreMatches.length) {
          coreMegaMenu.classList.add("hidden");
          return;
        }

        coreMegaMenuTitle.textContent = `Explore ${activeCore}`;
        coreMegaMenuItems.innerHTML = coreMatches.map((resource) => {
          const descriptor = briefDescription(resource.description);
          const itemClasses = "block rounded-xl px-2 py-1.5 transition hover:bg-white/90";
          if (resource.status !== "live") {
            return `<article class="${itemClasses}"><p class="font-heading text-[1.55rem] font-extrabold leading-tight text-cc-text">${resource.title} <span class="text-sm font-semibold text-cc-text/55">| ${descriptor} (Coming Soon)</span></p></article>`;
          }
          return `<a href="${resource.url}" class="${itemClasses}"><p class="font-heading text-[1.55rem] font-extrabold leading-tight text-cc-text">${resource.title} <span class="text-sm font-semibold text-cc-text/55">| ${descriptor}</span></p></a>`;
        }).join("");
        coreMegaMenu.classList.remove("hidden");
      }


      searchInput.addEventListener("input", (event) => {
        renderResults(event.target.value);
      });

      suggestionsContainer.addEventListener("click", (event) => {
        const button = event.target.closest("button[data-suggestion]");
        if (!button) return;
        searchInput.value = button.dataset.suggestion;
        searchInput.focus();
        renderResults(button.dataset.suggestion);
      });

      function setActiveCoreTab(activeTab) {
        coreTopBar.querySelectorAll("button[data-core]").forEach((btn) => {
          btn.classList.toggle("text-cc-text", btn === activeTab);
          btn.classList.toggle("underline", btn === activeTab);
          btn.classList.toggle("underline-offset-4", btn === activeTab);
          btn.setAttribute("aria-expanded", btn === activeTab ? "true" : "false");
        });
      }

      coreTopBar.addEventListener("click", (event) => {
        const tab = event.target.closest("button[data-core]");
        if (!tab) return;

        const isActive = tab.getAttribute("aria-expanded") === "true";
        if (isActive) {
          coreMegaMenu.classList.add("hidden");
          setActiveCoreTab(null);
          return;
        }

        renderCoreMegaMenu(tab.dataset.core);
        setActiveCoreTab(tab);
      });

      coreTopBar.addEventListener("focusin", (event) => {
        const tab = event.target.closest("button[data-core]");
        if (!tab) return;
        renderCoreMegaMenu(tab.dataset.core);
        setActiveCoreTab(tab);
      });

      document.addEventListener("click", (event) => {
        if (coreTopBar.contains(event.target) || coreMegaMenu.contains(event.target)) return;
        coreMegaMenu.classList.add("hidden");
        setActiveCoreTab(null);
      });

      // initial render: minimal UI + elegant suggestions
      renderSuggestions();
    </script>
  </body>
</html>
