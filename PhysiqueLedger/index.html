<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Physique Ledger | Chasing Change</title>
    <meta
      name="description"
      content="Weekly repeatable meal planning for Chasing Change clients: build a master day, apply it to your week, and instantly see macro totals."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Muli:wght@300;400;600;700&family=Museo+Moderno:wght@500;700&family=Raleway:wght@500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../shared.css" />
    <script src="../shared-global-nav.js" defer></script>
    <style>
      :root {
        --bg: #f5f5f7;
        --text: #071f35;
        --accent: #77d770;
        --card: #ffffff;
        --muted: rgba(7, 31, 53, 0.62);
        --line: rgba(7, 31, 53, 0.12);
        --cal: #77d770;
        --pro: #5f93ff;
        --carb: #f4c24f;
        --fat: #c49bff;
      }

      * { box-sizing: border-box; }
      body { margin: 0; background: var(--bg); color: var(--text); font-family: "Muli", sans-serif; }
      .container { width: min(1180px, 94vw); margin: 0 auto; padding: 1.1rem 0 2.8rem; }
      .hero h1 { margin: 0; font-family: "Museo Moderno", sans-serif; font-size: clamp(2rem, 3.8vw, 2.9rem); }
      .hero p { margin: .3rem 0 0; font-family: "Raleway", sans-serif; color: var(--muted); }
      .card { background: var(--card); border: 1px solid var(--line); border-radius: 18px; box-shadow: 0 14px 30px rgba(7, 31, 53, 0.06); }
      .section { margin-top: .85rem; padding: .95rem; }
      .section h2 { margin: 0 0 .55rem; font-family: "Raleway", sans-serif; font-size: 1.06rem; }
      .tiny { font-size: .78rem; color: var(--muted); }

      .summary-grid { display: grid; gap: .55rem; grid-template-columns: repeat(auto-fit, minmax(190px, 1fr)); }
      .metric-card { border: 1px solid var(--line); border-radius: 14px; padding: .62rem; background: rgba(7, 31, 53, 0.02); }
      .metric-card strong { display: block; font-family: "Raleway", sans-serif; font-size: .77rem; margin-bottom: .2rem; }
      .macro-row { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: .3rem; }
      .macro-chip { border-radius: 10px; padding: .35rem; border: 1px solid rgba(7, 31, 53, 0.1); font-size: .76rem; }
      .macro-chip span { display: block; font-size: .95rem; font-weight: 700; margin-top: .1rem; }
      .macro-chip.calories { background: color-mix(in srgb, var(--cal) 17%, white); border-color: color-mix(in srgb, var(--cal) 45%, white); }
      .macro-chip.protein { background: color-mix(in srgb, var(--pro) 13%, white); border-color: color-mix(in srgb, var(--pro) 40%, white); }
      .macro-chip.carbs { background: color-mix(in srgb, var(--carb) 16%, white); border-color: color-mix(in srgb, var(--carb) 45%, white); }
      .macro-chip.fats { background: color-mix(in srgb, var(--fat) 12%, white); border-color: color-mix(in srgb, var(--fat) 40%, white); }

      .inputs { display: grid; gap: .5rem; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); margin-top: .55rem; }
      label { display: grid; gap: .2rem; font-size: .75rem; font-family: "Raleway", sans-serif; font-weight: 700; }
      input, select, textarea, button { font: inherit; color: var(--text); }
      input, select, textarea { width: 100%; border-radius: 10px; border: 1px solid rgba(7,31,53,.2); background: white; padding: .46rem .56rem; }
      button { border-radius: 10px; border: 1px solid rgba(7,31,53,.2); background: white; padding: .42rem .62rem; font-weight: 700; cursor: pointer; }
      button.primary { background: var(--text); color: white; border-color: var(--text); }
      button.accent { background: var(--accent); border-color: var(--accent); }
      button.ghost { background: rgba(7,31,53,.03); }

      .row { display: flex; align-items: center; gap: .45rem; flex-wrap: wrap; }
      .tabs { display: grid; gap: .4rem; grid-template-columns: repeat(auto-fit, minmax(90px, 1fr)); margin-top: .6rem; }
      .tab { font-family: "Raleway", sans-serif; }
      .tab.active { background: var(--text); color: white; }

      .day-layout { margin-top: .7rem; display: grid; gap: .68rem; }
      .meal-card { border: 1px solid var(--line); border-radius: 14px; padding: .6rem; background: #fff; }
      .meal-head { display: flex; align-items: center; justify-content: space-between; gap: .4rem; margin-bottom: .45rem; }
      .meal-head h3 { margin: 0; font-family: "Raleway", sans-serif; font-size: .97rem; }
      .item { border: 1px solid rgba(7,31,53,.12); border-radius: 12px; padding: .46rem; margin-bottom: .4rem; background: rgba(7,31,53,.02); }
      .item-name { font-weight: 700; }
      .item-meta { font-size: .75rem; color: var(--muted); margin-top: .1rem; }
      .qty-row { display: flex; align-items: center; gap: .35rem; margin-top: .34rem; flex-wrap: wrap; }
      .qty-row input { width: 82px; }
      .qty-btn { width: 30px; height: 30px; padding: 0; border-radius: 8px; }

      .subtotal, .day-total, .helper-card { border: 1px dashed rgba(7,31,53,.2); border-radius: 12px; padding: .45rem; background: rgba(7,31,53,.02); }
      .day-total { border-style: solid; background: #fff; }
      .helper-card { font-size: .8rem; }

      .modal-backdrop { position: fixed; inset: 0; background: rgba(7, 31, 53, .45); display: none; align-items: center; justify-content: center; padding: 1rem; z-index: 40; }
      .modal-backdrop.show { display: flex; }
      .modal { width: min(780px, 100%); background: #fff; border-radius: 16px; border: 1px solid var(--line); box-shadow: 0 20px 48px rgba(7,31,53,.2); padding: .8rem; max-height: 86vh; overflow: auto; }
      .modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: .7rem; }
      .list { border: 1px solid var(--line); border-radius: 12px; padding: .45rem; max-height: 280px; overflow: auto; }
      .list-item { display: flex; align-items: center; justify-content: space-between; gap: .4rem; padding: .33rem 0; border-bottom: 1px solid rgba(7,31,53,.08); }
      .list-item:last-child { border-bottom: none; }

      .manager-actions { margin-top: .6rem; display: flex; gap: .45rem; flex-wrap: wrap; }
      .coach-grid { display: grid; gap: .55rem; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); }

      @media (max-width: 860px) {
        .modal-grid { grid-template-columns: 1fr; }
        .macro-row { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      }

      @media print {
        nav, .tabs, .manager-actions, .no-print, .modal-backdrop { display: none !important; }
        body { background: white; }
        .card, .meal-card, .item, .day-total { box-shadow: none; }
      }
    </style>
  </head>
  <body>
    <main class="container">
      <header class="hero">
        <h1>Physique Ledger</h1>
        <p>Build one repeatable week in minutes. Then adjust only what changes.</p>
      </header>

      <section class="card section">
        <h2>Targets & Weekly Alignment</h2>
        <div id="summaryGrid" class="summary-grid"></div>
        <div class="inputs" id="targetInputs"></div>
      </section>

      <section class="card section">
        <div class="row" style="justify-content:space-between;">
          <h2 style="margin:0;">Week Builder</h2>
          <div class="row no-print">
            <button id="openRecipeBuilder" class="ghost">Recipe Builder</button>
            <button id="openCustomFood" class="ghost">Custom Foods</button>
            <button id="openSavedMealBuilder" class="ghost">Saved Meals</button>
            <button id="printPlan" class="accent">Print / Save PDF</button>
          </div>
        </div>

        <div class="tabs" id="dayTabs"></div>

        <div class="manager-actions no-print">
          <button class="accent" id="applyMasterAll">Apply Master Day to Full Week</button>
          <button id="applyMasterWeekdays">Apply Master to Weekdays</button>
          <button id="copyMasterSelected">Copy Master to Selected Days</button>
          <button id="resetDayToMaster">Reset Current Day to Master</button>
          <button id="clearCurrentDay" class="ghost">Clear Current Day</button>
        </div>

        <div id="dayView" class="day-layout"></div>
      </section>

      <section class="card section">
        <h2>Coach Context (Optional)</h2>
        <div class="coach-grid">
          <label>Client Name<input id="clientName" placeholder="Client name" /></label>
          <label>Goal Phase
            <select id="goalPhase">
              <option value="cut">cut</option>
              <option value="maintain">maintain</option>
              <option value="gain">gain</option>
            </select>
          </label>
          <label>Date Last Updated<input id="lastUpdated" type="date" /></label>
          <label style="grid-column: 1 / -1;">Coach Notes<textarea id="coachNotes" rows="3" placeholder="Optional coaching notes"></textarea></label>
        </div>
      </section>
    </main>

    <div class="modal-backdrop" id="addModal">
      <div class="modal">
        <div class="row" style="justify-content:space-between;">
          <h3 style="margin:0;font-family:'Raleway',sans-serif;">Add to Meal</h3>
          <button data-close-modal="addModal">Close</button>
        </div>
        <label style="margin-top:.45rem;">Search<input id="addSearch" placeholder="Search foods, meals, recipes" /></label>
        <div class="modal-grid" style="margin-top:.6rem;">
          <div>
            <h4 style="margin:.2rem 0;font-family:'Raleway',sans-serif;">Recent</h4>
            <div class="list" id="recentList"></div>
            <h4 style="margin:.55rem 0 .2rem;font-family:'Raleway',sans-serif;">Common Foods</h4>
            <div class="list" id="commonFoodList"></div>
          </div>
          <div>
            <h4 style="margin:.2rem 0;font-family:'Raleway',sans-serif;">Saved Meals</h4>
            <div class="list" id="savedMealList"></div>
            <h4 style="margin:.55rem 0 .2rem;font-family:'Raleway',sans-serif;">Saved Recipes</h4>
            <div class="list" id="savedRecipeList"></div>
            <h4 style="margin:.55rem 0 .2rem;font-family:'Raleway',sans-serif;">Custom Foods</h4>
            <div class="list" id="customFoodList"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="modal-backdrop" id="customFoodModal">
      <div class="modal">
        <div class="row" style="justify-content:space-between;">
          <h3 style="margin:0;font-family:'Raleway',sans-serif;">Custom Foods</h3>
          <button data-close-modal="customFoodModal">Close</button>
        </div>
        <div class="inputs" style="margin-top:.6rem;">
          <label>Name<input id="customFoodName" /></label>
          <label>Serving Size<input id="customServing" placeholder="e.g., 1 scoop" /></label>
          <label>Calories<input id="customCalories" type="number" min="0" step="0.1" /></label>
          <label>Protein<input id="customProtein" type="number" min="0" step="0.1" /></label>
          <label>Carbs<input id="customCarbs" type="number" min="0" step="0.1" /></label>
          <label>Fats<input id="customFats" type="number" min="0" step="0.1" /></label>
        </div>
        <div class="row" style="margin-top:.55rem;"><button id="saveCustomFood" class="primary">Save Custom Food</button></div>
        <div id="customFoodManager" class="list" style="margin-top:.55rem;max-height:260px;"></div>
      </div>
    </div>

    <div class="modal-backdrop" id="recipeModal">
      <div class="modal">
        <div class="row" style="justify-content:space-between;">
          <h3 style="margin:0;font-family:'Raleway',sans-serif;">Recipe Builder</h3>
          <button data-close-modal="recipeModal">Close</button>
        </div>
        <div class="inputs" style="margin-top:.55rem;">
          <label>Recipe Name<input id="recipeName" /></label>
          <label>Total Servings<input id="recipeServings" type="number" min="0.25" step="0.25" value="1" /></label>
        </div>
        <div class="list" id="recipeIngredientList" style="margin-top:.55rem;"></div>
        <div class="row" style="margin-top:.5rem;"><button id="addRecipeIngredient">Add Ingredient</button><button id="saveRecipe" class="primary">Save Recipe</button></div>
        <div class="helper-card" id="recipeMacroPreview" style="margin-top:.5rem;"></div>
        <div id="recipeManager" class="list" style="margin-top:.55rem;max-height:250px;"></div>
      </div>
    </div>

    <div class="modal-backdrop" id="savedMealModal">
      <div class="modal">
        <div class="row" style="justify-content:space-between;">
          <h3 style="margin:0;font-family:'Raleway',sans-serif;">Saved Meal Builder</h3>
          <button data-close-modal="savedMealModal">Close</button>
        </div>
        <label style="margin-top:.5rem;">Meal Name<input id="savedMealName" /></label>
        <div class="list" id="savedMealItemBuilder" style="margin-top:.55rem;"></div>
        <div class="row" style="margin-top:.5rem;"><button id="addSavedMealItem">Add Item</button><button class="primary" id="saveSavedMeal">Save Meal</button></div>
        <div class="helper-card" id="savedMealPreview" style="margin-top:.5rem;"></div>
        <div id="savedMealManager" class="list" style="margin-top:.55rem;max-height:240px;"></div>
      </div>
    </div>

    <script>
      const STORAGE_KEY = "physiqueLedgerStateV6";
      const LEGACY_KEY = "physiqueLedgerStateV5";
      const TARGETS_KEY = "physiqueLedgerTargets";
      const MACRO_STORAGE_KEY = "macroCalculator";
      const days = ["Master Day", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday", "Sunday"];
      const meals = ["Breakfast", "Lunch", "Dinner", "Snacks"];

      const builtInFoods = [
        ["egg", "1 egg", 72, 6.3, 0.4, 4.8], ["banana", "1 banana", 105, 1.3, 27, 0.3], ["protein shake", "1 scoop", 120, 24, 3, 1.5],
        ["rice cake", "1 cake", 35, 0.7, 7, 0.3], ["chicken breast", "5 oz", 234, 44, 0, 5], ["greek yogurt bowl", "1 serving", 300, 28, 34, 7],
        ["oatmeal", "1 cup", 154, 5.3, 27, 2.6], ["white rice", "1 cup", 205, 4.3, 45, 0.4], ["salmon", "5 oz", 290, 31, 0, 17],
        ["avocado", "0.5 item", 120, 1.5, 6, 11], ["tortilla", "1 tortilla", 140, 4, 24, 3.5], ["almonds", "1 oz", 164, 6, 6, 14],
      ].map((f) => ({ id: slug(f[0]), type: "food", name: f[0], servingLabel: f[1], macros: { calories: f[2], protein: f[3], carbs: f[4], fats: f[5] } }));

      const macroFields = ["calories", "protein", "carbs", "fats"];
      const blankTotals = () => ({ calories: 0, protein: 0, carbs: 0, fats: 0 });
      const blankMealPlan = () => Object.fromEntries(meals.map((m) => [m, []]));
      const uid = () => crypto.randomUUID();

      const defaultState = {
        targets: { calories: 2200, protein: 180, carbs: 220, fats: 70 },
        selectedDay: "Master Day",
        coach: { clientName: "", goalPhase: "maintain", coachNotes: "", lastUpdated: "" },
        weekPlan: Object.fromEntries(days.map((d) => [d, blankMealPlan()])),
        customFoods: [],
        recipes: [],
        savedMeals: [],
        recent: [],
        recipeBuilder: { ingredients: [{ id: uid(), sourceId: "", qty: 1 }] },
        savedMealBuilder: { items: [{ id: uid(), sourceType: "food", sourceId: "", qty: 1 }] }
      };

      let state = loadState();
      let addContext = { day: "Master Day", meal: "Breakfast" };

      function slug(text) { return String(text || "").toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/(^-|-$)/g, ""); }
      function n(value, fallback = 0) { const x = Number(value); return Number.isFinite(x) ? x : fallback; }
      function clone(obj) { return JSON.parse(JSON.stringify(obj)); }
      function dayKey(day) { return day; }
      function getDayPlan(day) { return state.weekPlan[dayKey(day)] || blankMealPlan(); }
      function fmt(v) { return Math.round(v * 10) / 10; }

      function loadTargets() {
        try {
          const direct = JSON.parse(localStorage.getItem(TARGETS_KEY) || "null");
          if (direct?.calories) return { calories: n(direct.calories), protein: n(direct.protein), carbs: n(direct.carbs), fats: n(direct.fats) };
        } catch {}
        try {
          const macro = JSON.parse(localStorage.getItem(MACRO_STORAGE_KEY) || "null");
          if (macro?.outputs) return { calories: n(macro.outputs.calories), protein: n(macro.outputs.protein), carbs: n(macro.outputs.carbs), fats: n(macro.outputs.fat) };
        } catch {}
        return null;
      }

      function loadState() {
        let base = clone(defaultState);
        try {
          const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "null") || JSON.parse(localStorage.getItem(LEGACY_KEY) || "null");
          if (saved) base = { ...base, ...saved, coach: { ...base.coach, ...(saved.coach || {}) }, targets: { ...base.targets, ...(saved.targets || {}) } };
        } catch {}
        const targets = loadTargets();
        if (targets) base.targets = { ...base.targets, ...targets };
        days.forEach((d) => {
          if (!base.weekPlan[d]) base.weekPlan[d] = blankMealPlan();
          meals.forEach((m) => { if (!Array.isArray(base.weekPlan[d][m])) base.weekPlan[d][m] = []; });
        });
        return base;
      }

      function saveState() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        localStorage.setItem(TARGETS_KEY, JSON.stringify(state.targets));
      }

      function allFoods() { return [...builtInFoods, ...state.customFoods, ...state.recipes.map(recipeAsFood)]; }
      function allSearchItems() {
        return {
          recent: state.recent.map((r) => resolveSearchReference(r)).filter(Boolean),
          foods: [...builtInFoods],
          savedMeals: [...state.savedMeals],
          recipes: state.recipes.map(recipeAsFood),
          customFoods: [...state.customFoods]
        };
      }

      function recipeAsFood(recipe) {
        return { id: recipe.id, type: "recipe", name: recipe.name, servingLabel: "1 serving", macros: clone(recipe.perServingMacros) };
      }

      function sourceMacros(sourceType, sourceId) {
        if (sourceType === "saved_meal") {
          const meal = state.savedMeals.find((x) => x.id === sourceId);
          return meal ? clone(meal.macros) : blankTotals();
        }
        const food = allFoods().find((x) => x.id === sourceId);
        return food ? clone(food.macros) : blankTotals();
      }

      function multiplyMacros(macros, qty) {
        return {
          calories: fmt(macros.calories * qty), protein: fmt(macros.protein * qty), carbs: fmt(macros.carbs * qty), fats: fmt(macros.fats * qty)
        };
      }

      function makeItem({ sourceType, sourceId, qty }) {
        const quantity = Math.max(0, n(qty, 1));
        const source = sourceType === "saved_meal" ? state.savedMeals.find((x) => x.id === sourceId) : allFoods().find((x) => x.id === sourceId);
        if (!source) return null;
        const baseMacros = sourceType === "saved_meal" ? source.macros : source.macros;
        return {
          id: uid(),
          sourceType,
          sourceId,
          name: source.name,
          servingLabel: sourceType === "saved_meal" ? "1 serving" : (source.servingLabel || "1 serving"),
          qty: quantity,
          macrosPerUnit: clone(baseMacros),
          macros: multiplyMacros(baseMacros, quantity)
        };
      }

      function recalcItem(item) {
        item.qty = Math.max(0, n(item.qty, 0));
        item.macros = multiplyMacros(item.macrosPerUnit, item.qty);
      }

      function dayTotals(day) {
        const totals = blankTotals();
        meals.forEach((m) => getDayPlan(day)[m].forEach((item) => macroFields.forEach((f) => totals[f] += n(item.macros[f]))));
        macroFields.forEach((f) => totals[f] = fmt(totals[f]));
        return totals;
      }

      function weeklyTotals() {
        const totals = blankTotals();
        days.filter((d) => d !== "Master Day").forEach((day) => {
          const t = dayTotals(day);
          macroFields.forEach((f) => totals[f] += t[f]);
        });
        macroFields.forEach((f) => totals[f] = fmt(totals[f]));
        return totals;
      }

      function remainingToday() {
        const planned = dayTotals(state.selectedDay === "Master Day" ? "Master Day" : state.selectedDay);
        return {
          calories: fmt(state.targets.calories - planned.calories),
          protein: fmt(state.targets.protein - planned.protein),
          carbs: fmt(state.targets.carbs - planned.carbs),
          fats: fmt(state.targets.fats - planned.fats)
        };
      }

      function helperMessages(day) {
        const planned = dayTotals(day);
        const msgs = [];
        if (planned.protein < state.targets.protein * 0.9) msgs.push(`Protein is low for this day (−${Math.round(state.targets.protein - planned.protein)}g).`);
        if (planned.calories < state.targets.calories * 0.9) msgs.push(`You are under calories by ${Math.round(state.targets.calories - planned.calories)} kcal.`);
        if (planned.calories < state.targets.calories * 0.75) msgs.push("This day is much lower than your target.");
        if (day !== "Master Day") msgs.push("Want to copy this lunch to the rest of the week? Duplicate it from Lunch row actions.");
        return msgs.slice(0, 2);
      }

      function renderSummary() {
        const plannedToday = dayTotals(state.selectedDay);
        const remaining = remainingToday();
        const weekly = weeklyTotals();
        const weeklyTarget = multiplyMacros(state.targets, 7);
        const avg = multiplyMacros(weekly, 1 / 7);

        const card = (title, totals) => `<div class="metric-card"><strong>${title}</strong><div class="macro-row">${macroFields.map((f) => `<div class="macro-chip ${f}">${f}<span>${Math.round(totals[f])}${f === "calories" ? "" : "g"}</span></div>`).join("")}</div></div>`;
        document.getElementById("summaryGrid").innerHTML = [
          card("Daily Target", state.targets),
          card("Planned Today", plannedToday),
          card("Remaining Today", remaining),
          card("Weekly Target", weeklyTarget),
          card("Weekly Planned", weekly),
          card("Weekly Average Per Day", avg)
        ].join("");

        document.getElementById("targetInputs").innerHTML = [
          `<label>Calories Target<input data-target="calories" type="number" min="0" step="1" value="${state.targets.calories}" /></label>`,
          `<label>Protein Target<input data-target="protein" type="number" min="0" step="1" value="${state.targets.protein}" /></label>`,
          `<label>Carbs Target<input data-target="carbs" type="number" min="0" step="1" value="${state.targets.carbs}" /></label>`,
          `<label>Fats Target<input data-target="fats" type="number" min="0" step="1" value="${state.targets.fats}" /></label>`
        ].join("");
      }

      function renderTabs() {
        document.getElementById("dayTabs").innerHTML = days.map((d) => `<button class="tab ${state.selectedDay === d ? "active" : ""}" data-tab="${d}">${d}</button>`).join("");
      }

      function mealSubtotal(items) {
        const out = blankTotals();
        items.forEach((it) => macroFields.forEach((f) => out[f] += n(it.macros[f])));
        macroFields.forEach((f) => out[f] = fmt(out[f]));
        return out;
      }

      function renderMealCard(day, meal) {
        const rows = getDayPlan(day)[meal];
        const subtotal = mealSubtotal(rows);
        return `<article class="meal-card">
          <div class="meal-head"><h3>${meal}</h3><div class="row no-print"><button data-open-add="${day}|${meal}">Add Food</button><button data-open-add="${day}|${meal}">Add Saved Meal</button><button data-open-add="${day}|${meal}">Add Saved Recipe</button></div></div>
          ${rows.map((item) => `
            <div class="item">
              <div class="row" style="justify-content:space-between;">
                <div><div class="item-name">${item.name}</div><div class="item-meta">${item.servingLabel}</div></div>
                <div class="row no-print"><button data-duplicate-item="${day}|${meal}|${item.id}">Duplicate</button><button data-delete-item="${day}|${meal}|${item.id}">Delete</button></div>
              </div>
              <div class="qty-row no-print"><button class="qty-btn" data-adjust="${day}|${meal}|${item.id}|-0.5">−</button><input type="number" min="0" step="0.25" data-qty="${day}|${meal}|${item.id}" value="${item.qty}" /><button class="qty-btn" data-adjust="${day}|${meal}|${item.id}|0.5">+</button><span class="tiny">${item.macros.calories} kcal · P ${item.macros.protein} · C ${item.macros.carbs} · F ${item.macros.fats}</span></div>
            </div>
          `).join("") || `<div class="tiny">No items yet.</div>`}
          <div class="subtotal tiny">Subtotal — ${Math.round(subtotal.calories)} kcal · P ${Math.round(subtotal.protein)}g · C ${Math.round(subtotal.carbs)}g · F ${Math.round(subtotal.fats)}g</div>
        </article>`;
      }

      function renderDayView() {
        const day = state.selectedDay;
        const totals = dayTotals(day);
        const helpers = helperMessages(day);
        document.getElementById("dayView").innerHTML = [
          ...helpers.map((m) => `<div class="helper-card">${m}</div>`),
          ...meals.map((meal) => renderMealCard(day, meal)),
          `<div class="day-total"><strong style="font-family:'Raleway',sans-serif;">${day} Total</strong><div class="tiny" style="margin-top:.18rem;">${Math.round(totals.calories)} kcal · P ${Math.round(totals.protein)}g · C ${Math.round(totals.carbs)}g · F ${Math.round(totals.fats)}g</div></div>`
        ].join("");
      }

      function renderCoach() {
        document.getElementById("clientName").value = state.coach.clientName || "";
        document.getElementById("goalPhase").value = state.coach.goalPhase || "maintain";
        document.getElementById("coachNotes").value = state.coach.coachNotes || "";
        document.getElementById("lastUpdated").value = state.coach.lastUpdated || "";
      }

      function renderAddModal() {
        const query = document.getElementById("addSearch")?.value?.trim().toLowerCase() || "";
        const pool = allSearchItems();
        const filter = (arr) => arr.filter((x) => !query || x.name.toLowerCase().includes(query));

        const row = (entry, sourceType) => `<div class="list-item"><span>${entry.name}</span><span class="row"><button data-quick-add='${JSON.stringify({ sourceType, sourceId: entry.id }).replace(/'/g, "&apos;")}'>Add</button></span></div>`;
        document.getElementById("recentList").innerHTML = filter(pool.recent).map((x) => row(x, x.type === "saved_meal" ? "saved_meal" : "food")).join("") || `<div class="tiny">No recent items.</div>`;
        document.getElementById("commonFoodList").innerHTML = filter(pool.foods).map((x) => row(x, "food")).join("") || `<div class="tiny">No results.</div>`;
        document.getElementById("savedMealList").innerHTML = filter(pool.savedMeals).map((x) => row(x, "saved_meal")).join("") || `<div class="tiny">No saved meals yet.</div>`;
        document.getElementById("savedRecipeList").innerHTML = filter(pool.recipes).map((x) => row(x, "food")).join("") || `<div class="tiny">No recipes yet.</div>`;
        document.getElementById("customFoodList").innerHTML = filter(pool.customFoods).map((x) => row(x, "food")).join("") || `<div class="tiny">No custom foods yet.</div>`;
      }

      function renderCustomFoodManager() {
        document.getElementById("customFoodManager").innerHTML = state.customFoods.map((f) => `<div class="list-item"><span>${f.name} (${f.servingLabel})</span><button data-delete-custom="${f.id}">Delete</button></div>`).join("") || `<div class="tiny">No custom foods saved.</div>`;
      }

      function recipeBuilderTotals() {
        const total = blankTotals();
        state.recipeBuilder.ingredients.forEach((ing) => {
          const source = allFoods().find((f) => f.id === ing.sourceId);
          if (!source) return;
          const m = multiplyMacros(source.macros, Math.max(0, n(ing.qty, 0)));
          macroFields.forEach((k) => total[k] += m[k]);
        });
        macroFields.forEach((k) => total[k] = fmt(total[k]));
        const servings = Math.max(0.25, n(document.getElementById("recipeServings")?.value, 1));
        return { total, perServing: multiplyMacros(total, 1 / servings) };
      }

      function renderRecipeBuilder() {
        const foodOptions = allFoods().filter((f) => f.type !== "recipe");
        const list = document.getElementById("recipeIngredientList");
        list.innerHTML = state.recipeBuilder.ingredients.map((ing) => `
          <div class="list-item">
            <select data-r-food="${ing.id}"><option value="">Select ingredient</option>${foodOptions.map((f) => `<option value="${f.id}" ${f.id === ing.sourceId ? "selected" : ""}>${f.name}</option>`).join("")}</select>
            <input type="number" min="0" step="0.25" value="${ing.qty}" data-r-qty="${ing.id}" style="width:88px;" />
            <button data-r-del="${ing.id}">Remove</button>
          </div>
        `).join("");

        const totals = recipeBuilderTotals();
        document.getElementById("recipeMacroPreview").textContent = `Recipe total: ${Math.round(totals.total.calories)} kcal · P ${Math.round(totals.total.protein)} · C ${Math.round(totals.total.carbs)} · F ${Math.round(totals.total.fats)} | Per serving: ${Math.round(totals.perServing.calories)} kcal`;
        document.getElementById("recipeManager").innerHTML = state.recipes.map((r) => `<div class="list-item"><span>${r.name}</span><button data-delete-recipe="${r.id}">Delete</button></div>`).join("") || `<div class="tiny">No recipes saved.</div>`;
      }

      function savedMealBuilderTotals() {
        const total = blankTotals();
        state.savedMealBuilder.items.forEach((it) => {
          const m = sourceMacros(it.sourceType, it.sourceId);
          const scaled = multiplyMacros(m, Math.max(0, n(it.qty, 0)));
          macroFields.forEach((f) => total[f] += scaled[f]);
        });
        macroFields.forEach((f) => total[f] = fmt(total[f]));
        return total;
      }

      function renderSavedMealBuilder() {
        const sources = [...allFoods().map((x) => ({ id: x.id, name: x.name, sourceType: "food" })), ...state.savedMeals.map((x) => ({ id: x.id, name: x.name, sourceType: "saved_meal" }))];
        document.getElementById("savedMealItemBuilder").innerHTML = state.savedMealBuilder.items.map((row) => `
          <div class="list-item">
            <select data-sm-source="${row.id}"><option value="">Select item</option>${sources.map((s) => `<option value="${s.sourceType}|${s.id}" ${row.sourceId === s.id && row.sourceType === s.sourceType ? "selected" : ""}>${s.name}</option>`).join("")}</select>
            <input type="number" min="0" step="0.25" value="${row.qty}" data-sm-qty="${row.id}" style="width:86px;" />
            <button data-sm-del="${row.id}">Remove</button>
          </div>
        `).join("");
        const preview = savedMealBuilderTotals();
        document.getElementById("savedMealPreview").textContent = `Meal total: ${Math.round(preview.calories)} kcal · P ${Math.round(preview.protein)} · C ${Math.round(preview.carbs)} · F ${Math.round(preview.fats)}`;
        document.getElementById("savedMealManager").innerHTML = state.savedMeals.map((m) => `<div class="list-item"><span>${m.name}</span><button data-delete-saved-meal="${m.id}">Delete</button></div>`).join("") || `<div class="tiny">No saved meals yet.</div>`;
      }

      function resolveSearchReference(ref) {
        if (ref.type === "saved_meal") return state.savedMeals.find((x) => x.id === ref.id) || null;
        return allFoods().find((x) => x.id === ref.id) || null;
      }

      function pushRecent(sourceType, sourceId) {
        state.recent = [{ type: sourceType, id: sourceId }, ...state.recent.filter((x) => !(x.type === sourceType && x.id === sourceId))].slice(0, 20);
      }

      function openModal(id) { document.getElementById(id).classList.add("show"); }
      function closeModal(id) { document.getElementById(id).classList.remove("show"); }

      function addItemToMeal(day, meal, sourceType, sourceId, qty = 1) {
        const item = makeItem({ sourceType, sourceId, qty });
        if (!item) return;
        getDayPlan(day)[meal].push(item);
        pushRecent(sourceType, sourceId);
        persistAndRender();
      }

      function copyMasterTo(dayList) {
        dayList.forEach((d) => state.weekPlan[d] = clone(state.weekPlan["Master Day"]));
      }

      function persistAndRender() {
        state.coach.lastUpdated = state.coach.lastUpdated || new Date().toISOString().slice(0, 10);
        saveState();
        renderAll();
      }

      function renderAll() {
        renderSummary();
        renderTabs();
        renderDayView();
        renderCoach();
        renderAddModal();
        renderCustomFoodManager();
        renderRecipeBuilder();
        renderSavedMealBuilder();
      }

      document.body.addEventListener("click", (e) => {
        const t = e.target;
        if (t.dataset.tab) { state.selectedDay = t.dataset.tab; persistAndRender(); }

        if (t.dataset.openAdd) {
          const [day, meal] = t.dataset.openAdd.split("|");
          addContext = { day, meal };
          document.getElementById("addSearch").value = "";
          renderAddModal();
          openModal("addModal");
        }

        if (t.dataset.closeModal) closeModal(t.dataset.closeModal);

        if (t.dataset.quickAdd) {
          const data = JSON.parse(t.dataset.quickAdd.replaceAll("&apos;", "'"));
          addItemToMeal(addContext.day, addContext.meal, data.sourceType, data.sourceId, 1);
          renderAddModal();
        }

        if (t.dataset.deleteItem) {
          const [day, meal, id] = t.dataset.deleteItem.split("|");
          state.weekPlan[day][meal] = state.weekPlan[day][meal].filter((x) => x.id !== id);
          persistAndRender();
        }

        if (t.dataset.duplicateItem) {
          const [day, meal, id] = t.dataset.duplicateItem.split("|");
          const item = state.weekPlan[day][meal].find((x) => x.id === id);
          if (!item) return;
          const cloneItem = clone(item); cloneItem.id = uid();
          state.weekPlan[day][meal].push(cloneItem);
          persistAndRender();
        }

        if (t.dataset.adjust) {
          const [day, meal, id, diff] = t.dataset.adjust.split("|");
          const item = state.weekPlan[day][meal].find((x) => x.id === id);
          if (!item) return;
          item.qty = Math.max(0, fmt(item.qty + n(diff)));
          recalcItem(item);
          persistAndRender();
        }

        if (t.id === "applyMasterAll") { copyMasterTo(days.filter((d) => d !== "Master Day")); persistAndRender(); }
        if (t.id === "applyMasterWeekdays") { copyMasterTo(["Monday", "Tuesday", "Wednesday", "Thursday", "Friday"]); persistAndRender(); }
        if (t.id === "copyMasterSelected") {
          const chosen = prompt("Copy Master Day to which days? Example: Monday,Wednesday,Sunday");
          if (!chosen) return;
          const list = chosen.split(",").map((x) => x.trim()).filter((d) => days.includes(d) && d !== "Master Day");
          copyMasterTo(list);
          persistAndRender();
        }
        if (t.id === "resetDayToMaster") {
          if (state.selectedDay === "Master Day") return;
          state.weekPlan[state.selectedDay] = clone(state.weekPlan["Master Day"]);
          persistAndRender();
        }
        if (t.id === "clearCurrentDay") { state.weekPlan[state.selectedDay] = blankMealPlan(); persistAndRender(); }

        if (t.id === "openCustomFood") openModal("customFoodModal");
        if (t.id === "openRecipeBuilder") openModal("recipeModal");
        if (t.id === "openSavedMealBuilder") openModal("savedMealModal");
        if (t.id === "printPlan") window.print();

        if (t.id === "saveCustomFood") {
          const name = document.getElementById("customFoodName").value.trim();
          const servingLabel = document.getElementById("customServing").value.trim() || "1 serving";
          if (!name) return;
          state.customFoods.push({
            id: `custom-${slug(name)}-${Date.now()}`,
            type: "food",
            name,
            servingLabel,
            macros: {
              calories: n(document.getElementById("customCalories").value),
              protein: n(document.getElementById("customProtein").value),
              carbs: n(document.getElementById("customCarbs").value),
              fats: n(document.getElementById("customFats").value)
            }
          });
          ["customFoodName", "customServing", "customCalories", "customProtein", "customCarbs", "customFats"].forEach((id) => document.getElementById(id).value = "");
          persistAndRender();
        }

        if (t.dataset.deleteCustom) {
          state.customFoods = state.customFoods.filter((x) => x.id !== t.dataset.deleteCustom);
          persistAndRender();
        }

        if (t.id === "addRecipeIngredient") { state.recipeBuilder.ingredients.push({ id: uid(), sourceId: "", qty: 1 }); persistAndRender(); }
        if (t.dataset.rDel) { state.recipeBuilder.ingredients = state.recipeBuilder.ingredients.filter((x) => x.id !== t.dataset.rDel); if (!state.recipeBuilder.ingredients.length) state.recipeBuilder.ingredients = [{ id: uid(), sourceId: "", qty: 1 }]; persistAndRender(); }

        if (t.id === "saveRecipe") {
          const name = document.getElementById("recipeName").value.trim();
          if (!name) return;
          const ingredients = state.recipeBuilder.ingredients.filter((x) => x.sourceId && n(x.qty) > 0);
          if (!ingredients.length) return;
          const servings = Math.max(0.25, n(document.getElementById("recipeServings").value, 1));
          const totals = recipeBuilderTotals();
          state.recipes.push({
            id: `recipe-${slug(name)}-${Date.now()}`,
            type: "recipe",
            name,
            ingredients: clone(ingredients),
            servings,
            totalMacros: totals.total,
            perServingMacros: multiplyMacros(totals.total, 1 / servings)
          });
          document.getElementById("recipeName").value = "";
          document.getElementById("recipeServings").value = "1";
          state.recipeBuilder = { ingredients: [{ id: uid(), sourceId: "", qty: 1 }] };
          persistAndRender();
        }

        if (t.dataset.deleteRecipe) {
          state.recipes = state.recipes.filter((x) => x.id !== t.dataset.deleteRecipe);
          persistAndRender();
        }

        if (t.id === "addSavedMealItem") { state.savedMealBuilder.items.push({ id: uid(), sourceType: "food", sourceId: "", qty: 1 }); persistAndRender(); }
        if (t.dataset.smDel) { state.savedMealBuilder.items = state.savedMealBuilder.items.filter((x) => x.id !== t.dataset.smDel); if (!state.savedMealBuilder.items.length) state.savedMealBuilder.items = [{ id: uid(), sourceType: "food", sourceId: "", qty: 1 }]; persistAndRender(); }

        if (t.id === "saveSavedMeal") {
          const name = document.getElementById("savedMealName").value.trim();
          if (!name) return;
          const items = state.savedMealBuilder.items.filter((x) => x.sourceId && n(x.qty) > 0);
          if (!items.length) return;
          state.savedMeals.push({ id: `meal-${slug(name)}-${Date.now()}`, type: "saved_meal", name, items: clone(items), macros: savedMealBuilderTotals() });
          document.getElementById("savedMealName").value = "";
          state.savedMealBuilder = { items: [{ id: uid(), sourceType: "food", sourceId: "", qty: 1 }] };
          persistAndRender();
        }

        if (t.dataset.deleteSavedMeal) {
          state.savedMeals = state.savedMeals.filter((x) => x.id !== t.dataset.deleteSavedMeal);
          persistAndRender();
        }
      });

      document.body.addEventListener("input", (e) => {
        const t = e.target;
        if (t.dataset.target) { state.targets[t.dataset.target] = Math.max(0, n(t.value)); persistAndRender(); }
        if (t.dataset.qty) {
          const [day, meal, id] = t.dataset.qty.split("|");
          const item = state.weekPlan[day][meal].find((x) => x.id === id);
          if (!item) return;
          item.qty = Math.max(0, n(t.value));
          recalcItem(item);
          persistAndRender();
        }
        if (t.id === "addSearch") renderAddModal();
        if (t.dataset.rQty) {
          const row = state.recipeBuilder.ingredients.find((x) => x.id === t.dataset.rQty);
          if (!row) return;
          row.qty = Math.max(0, n(t.value));
          persistAndRender();
        }
        if (t.dataset.rFood) {
          const row = state.recipeBuilder.ingredients.find((x) => x.id === t.dataset.rFood);
          if (!row) return;
          row.sourceId = t.value;
          persistAndRender();
        }
        if (t.dataset.smQty) {
          const row = state.savedMealBuilder.items.find((x) => x.id === t.dataset.smQty);
          if (!row) return;
          row.qty = Math.max(0, n(t.value));
          persistAndRender();
        }
        if (t.dataset.smSource) {
          const row = state.savedMealBuilder.items.find((x) => x.id === t.dataset.smSource);
          if (!row) return;
          const [sourceType, sourceId] = String(t.value).split("|");
          row.sourceType = sourceType || "food";
          row.sourceId = sourceId || "";
          persistAndRender();
        }

        if (["clientName", "goalPhase", "coachNotes", "lastUpdated"].includes(t.id)) {
          state.coach.clientName = document.getElementById("clientName").value;
          state.coach.goalPhase = document.getElementById("goalPhase").value;
          state.coach.coachNotes = document.getElementById("coachNotes").value;
          state.coach.lastUpdated = document.getElementById("lastUpdated").value;
          saveState();
        }
      });

      renderAll();
    </script>
  </body>
</html>
