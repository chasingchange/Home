<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Physique Ledger | Chasing Change</title>
    <meta
      name="description"
      content="Plan your full week of meals, track macros, and compare daily and weekly intake to your Chasing Change macro targets."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Muli:wght@300;400;600;700&family=Museo+Moderno:wght@500;700&family=Raleway:wght@500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../shared.css" />
    <script src="../shared-global-nav.js" defer></script>
    <style>
      :root { --bg:#f5f5f7; --text:#071f35; --accent:#77d770; --card:#fff; --muted:rgba(7,31,53,.62); }
      *{ box-sizing:border-box; }
      body{ margin:0; background:var(--bg); color:var(--text); font-family:"Muli",sans-serif; }
      .container{ width:min(1200px,94vw); margin:0 auto; padding:1.8rem 0 4rem; }
      .hero h1{ margin:0; font-family:"Museo Moderno",sans-serif; font-size:clamp(1.9rem,3.6vw,3rem); }
      .hero p{ margin:.45rem 0 1.2rem; color:var(--muted); font-family:"Raleway",sans-serif; }
      .card{ background:var(--card); border:1px solid rgba(7,31,53,.1); border-radius:18px; box-shadow:0 14px 36px rgba(7,31,53,.07); }
      .stack{ display:grid; gap:1rem; }
      .summary{ padding:1rem; display:grid; gap:.8rem; }
      .summary-grid{ display:grid; gap:.6rem; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); }
      .metric{ padding:.7rem; border-radius:12px; background:rgba(7,31,53,.03); }
      .metric strong{ display:block; font-family:"Raleway",sans-serif; font-size:.82rem; }
      .metric span{ font-size:1.1rem; font-weight:700; }
      .targets{ display:grid; gap:.55rem; grid-template-columns:repeat(auto-fit,minmax(120px,1fr)); }
      .pill{ display:inline-flex; align-items:center; gap:.35rem; border-radius:999px; padding:.2rem .65rem; font-size:.77rem; font-weight:700; }
      .pill.low{ background:rgba(240,156,0,.14);} .pill.on{ background:rgba(119,215,112,.2);} .pill.high{ background:rgba(255,84,84,.16);} .pill.maintain{ background:rgba(119,215,112,.2);} .pill.deficit{ background:rgba(66,133,244,.16);} .pill.surplus{ background:rgba(255,84,84,.16);} 
      label{ font-size:.8rem; font-weight:700; font-family:"Raleway",sans-serif; }
      input,select,button,textarea{ font:inherit; }
      input,select,textarea{ width:100%; border:1px solid rgba(7,31,53,.2); border-radius:10px; padding:.5rem .6rem; background:#fff; color:var(--text); }
      button{ border:1px solid rgba(7,31,53,.18); border-radius:10px; background:#fff; color:var(--text); padding:.45rem .7rem; font-weight:700; cursor:pointer; }
      button.primary{ background:var(--text); color:#fff; border-color:var(--text); }
      button.accent{ background:var(--accent); border-color:var(--accent); }
      .section{ padding:1rem; }
      .row{ display:flex; flex-wrap:wrap; gap:.5rem; align-items:center; }
      .master-actions,.global-actions{ display:flex; flex-wrap:wrap; gap:.5rem; margin-top:.7rem; }
      .day-grid{ display:grid; gap:1rem; grid-template-columns:repeat(auto-fit,minmax(310px,1fr)); }
      .day-card{ padding:1rem; }
      .day-head{ display:flex; justify-content:space-between; gap:.6rem; align-items:center; flex-wrap:wrap; margin-bottom:.8rem; }
      .meal{ border:1px solid rgba(7,31,53,.12); border-radius:12px; padding:.65rem; margin-bottom:.7rem; background:#fff; }
      .meal h4{ margin:0 0 .45rem; font-family:"Raleway",sans-serif; }
      .food-row{ border:1px solid rgba(7,31,53,.1); border-radius:10px; padding:.45rem; margin:.4rem 0; background:rgba(7,31,53,.02); }
      .food-top{ display:flex; justify-content:space-between; gap:.5rem; align-items:center; }
      .food-macros{ font-size:.76rem; color:var(--muted); display:flex; gap:.5rem; flex-wrap:wrap; margin-top:.35rem; }
      .tiny{ font-size:.76rem; color:var(--muted); }
      .totals{ display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:.45rem; margin-top:.6rem; }
      .totals div{ background:rgba(7,31,53,.03); border-radius:10px; padding:.4rem; font-size:.82rem; }
      .weekly{ padding:1rem; }
      .weekly-grid{ display:grid; gap:.6rem; grid-template-columns:repeat(auto-fit,minmax(165px,1fr)); }
      .bar{ height:8px; border-radius:999px; background:rgba(7,31,53,.1); overflow:hidden; }
      .bar > i{ display:block; height:100%; background:var(--accent); }
      .inline-input{ display:grid; grid-template-columns:1.3fr .8fr .7fr auto; gap:.45rem; }
      @media (max-width:640px){ .inline-input{ grid-template-columns:1fr; } .totals{ grid-template-columns:repeat(2,minmax(0,1fr)); } }
    </style>
  </head>
  <body>
    <main class="container">
      <header class="hero">
        <h1>Physique Ledger</h1>
        <p>Plan meals for the full week, track macros instantly, and align intake with your calorie and macro goal.</p>
      </header>

      <section class="card summary">
        <div class="summary-grid" id="targetSummary"></div>
        <div class="targets" id="targetInputs"></div>
      </section>

      <section class="card section">
        <div class="row" style="justify-content:space-between;">
          <h2 style="margin:0;font-family:'Raleway',sans-serif;">Custom Foods</h2>
          <span class="tiny">Save foods once and reuse them in search like built-in items.</span>
        </div>
        <div class="inline-input" style="margin-top:.6rem;">
          <input id="customName" placeholder="Food name">
          <input id="customAmount" type="number" min="0" step="0.1" placeholder="Serving amount">
          <select id="customUnit"></select>
          <button class="primary" id="addCustomFood">Save Food</button>
        </div>
        <div class="inline-input" style="margin-top:.5rem;grid-template-columns:repeat(4,minmax(0,1fr));">
          <input id="customCalories" type="number" min="0" step="0.1" placeholder="Calories">
          <input id="customProtein" type="number" min="0" step="0.1" placeholder="Protein">
          <input id="customCarbs" type="number" min="0" step="0.1" placeholder="Carbs">
          <input id="customFats" type="number" min="0" step="0.1" placeholder="Fats">
        </div>
        <div id="customFoodList" class="tiny" style="margin-top:.65rem;"></div>
      </section>

      <section class="card section">
        <div class="row" style="justify-content:space-between;">
          <h2 style="margin:0;font-family:'Raleway',sans-serif;">Master Day</h2>
          <span class="tiny">Build once, apply to week, then edit any day independently.</span>
        </div>
        <div id="masterDay"></div>
        <div class="master-actions">
          <button class="accent" id="applyMasterAll">Apply Master Day to Week</button>
          <button id="applyMasterEmpty">Apply Master Day to Empty Days</button>
          <button id="resetMaster">Reset Master Day</button>
        </div>
      </section>

      <section class="global-actions" style="margin:1rem 0;">
        <button id="clearWeek">Clear Week</button>
      </section>

      <section class="day-grid" id="weekGrid"></section>

      <section class="card weekly" id="weeklySummary"></section>

      <datalist id="foodSuggestions"></datalist>
    </main>

    <script>
      const STORAGE_KEY = "physiqueLedgerStateV3";
      const TARGETS_KEY = "physiqueLedgerTargets";
      const MACRO_STORAGE_KEY = "macroCalculator";
      const dayNames = ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];
      const meals = ["Breakfast","Lunch","Dinner","Snacks"];
      const thresholds = { calories:0.08, proteinLow:0.95, proteinHigh:1.1, carbs:0.1, fats:0.1 };

      const foodBank = [
        ["banana",118,"item",105,1.3,27,0.3,{item:118,g:1,oz:28.35}], ["apple",182,"item",95,0.5,25,0.3,{item:182,g:1,oz:28.35}],
        ["blueberries",148,"cup",84,1.1,21,0.5,{cup:148,g:1,oz:28.35}], ["strawberries",152,"cup",49,1,12,0.5,{cup:152,g:1,oz:28.35}],
        ["eggs",50,"item",72,6.3,0.4,4.8,{item:50,g:1,oz:28.35}], ["egg whites",33,"item",17,3.6,0.2,0,{item:33,g:1,oz:28.35,cup:243}],
        ["chicken breast",100,"g",165,31,0,3.6,{g:1,oz:28.35,lb:453.592}], ["ground beef",100,"g",250,26,0,17,{g:1,oz:28.35,lb:453.592}],
        ["steak",100,"g",271,25,0,19,{g:1,oz:28.35,lb:453.592}], ["salmon",100,"g",208,20,0,13,{g:1,oz:28.35,lb:453.592}],
        ["greek yogurt",170,"g",100,17,6,0,{g:1,oz:28.35,cup:245}], ["cottage cheese",113,"g",98,11,3.4,4.3,{g:1,oz:28.35,cup:226}],
        ["white rice",158,"cup",205,4.3,45,0.4,{cup:158,g:1,oz:28.35}], ["brown rice",195,"cup",216,5,45,1.8,{cup:195,g:1,oz:28.35}],
        ["oatmeal",40,"g",154,5.3,27,2.6,{g:1,oz:28.35,cup:80}], ["bread",38,"slice",100,4,19,1.3,{slice:38,g:1,oz:28.35}],
        ["bagel",95,"item",245,10,47,1.5,{item:95,g:1,oz:28.35}], ["tortilla",49,"item",140,4,24,3.5,{item:49,g:1,oz:28.35}],
        ["potato",213,"item",164,4.3,37,0.2,{item:213,g:1,oz:28.35}], ["sweet potato",130,"item",112,2,26,0.1,{item:130,g:1,oz:28.35}],
        ["avocado",50,"g",80,1,4,7.4,{g:1,oz:28.35,item:150}], ["peanut butter",16,"tbsp",94,3.6,3.2,8,{tbsp:16,tsp:5.3,g:1,oz:28.35}],
        ["almonds",28,"oz",164,6,6,14,{oz:28.35,g:1,item:1.2}], ["olive oil",14,"tbsp",119,0,0,13.5,{tbsp:14,tsp:4.67,ml:0.91,fl_oz:26.86,g:1}],
        ["milk",244,"cup",149,7.7,12,8,{cup:244,ml:1.03,fl_oz:30.4,g:1}], ["almond milk",240,"cup",30,1,1,2.5,{cup:240,ml:1.01,fl_oz:29.8,g:1}],
        ["protein powder",32,"scoop",120,24,3,1.5,{scoop:32,g:1,oz:28.35}], ["cheese",28,"oz",113,7,1,9,{oz:28.35,g:1,slice:21}],
        ["broccoli",91,"cup",31,2.5,6,0.3,{cup:91,g:1,oz:28.35}], ["spinach",30,"cup",7,0.9,1.1,0.1,{cup:30,g:1,oz:28.35}],
        ["mixed vegetables",85,"cup",59,2,12,0.2,{cup:85,g:1,oz:28.35}], ["pasta",56,"oz",200,7,42,1,{oz:28.35,g:1,cup:140}],
        ["turkey",100,"g",189,29,0,7,{g:1,oz:28.35,lb:453.592}], ["deli turkey",56,"oz",60,12,2,1,{oz:28.35,g:1,slice:28}],
        ["bacon",8,"slice",43,3,0.1,3.3,{slice:8,g:1,oz:28.35}], ["sausage",56,"oz",180,10,2,14,{oz:28.35,g:1,item:85}],
        ["black beans",130,"cup",227,15,41,0.9,{cup:130,g:1,oz:28.35}], ["granola",60,"cup",280,6,44,10,{cup:60,g:1,oz:28.35}],
        ["honey",21,"tbsp",64,0,17,0,{tbsp:21,tsp:7,ml:1.42,g:1}]
      ].map(([name,amount,unit,calories,protein,carbs,fats,units])=>({
        id:name.replace(/\s+/g,"-"),name,defaultServing:{amount,unit},macros:{calories,protein,carbs,fats},units
      }));

      const toSlug = (t)=>t.toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/(^-|-$)/g,"");
      const blankDay = ()=>({ meals:Object.fromEntries(meals.map(m=>[m,[]])), notes:"" });
      const defaultState = { targets:{calories:2200,protein:180,carbs:220,fats:70,goalType:"maintenance"}, masterDay:blankDay(), week:Object.fromEntries(dayNames.map(d=>[d,blankDay()])), customFoods:[], recentFoods:[] };

      let state = loadState();

      function parseNumber(v, fallback=0){ const n=Number(v); return Number.isFinite(n)?n:fallback; }
      function clone(obj){ return JSON.parse(JSON.stringify(obj)); }
      function dayRef(dayKey){ return dayKey === "masterDay" ? state.masterDay : state.week[dayKey]; }

      function loadState(){
        let merged = clone(defaultState);
        try { const saved = JSON.parse(localStorage.getItem(STORAGE_KEY)||"null"); if (saved) merged = {...merged,...saved}; } catch {}
        const savedTargets = getTargetsFromStorage();
        if (savedTargets) merged.targets = {...merged.targets,...savedTargets};
        return merged;
      }

      function getTargetsFromStorage(){
        try {
          const direct = JSON.parse(localStorage.getItem(TARGETS_KEY)||"null");
          if (direct && direct.calories) return {calories:+direct.calories,protein:+direct.protein,carbs:+direct.carbs,fats:+direct.fats,goalType:direct.goalType||direct.goal||"maintenance"};
        } catch {}
        try {
          const macro = JSON.parse(localStorage.getItem(MACRO_STORAGE_KEY)||"null");
          const out = macro?.outputs;
          if (!out) return null;
          return { calories:parseNumber(out.calories), protein:parseNumber(out.protein), carbs:parseNumber(out.carbs), fats:parseNumber(out.fat), goalType:macro?.profile?.goal || "maintenance" };
        } catch { return null; }
      }

      function saveState(){
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        localStorage.setItem(TARGETS_KEY, JSON.stringify(state.targets));
      }

      function normalizeUnit(unit){ const map={grams:"g",gram:"g",g:"g",ounces:"oz",ounce:"oz",oz:"oz",lbs:"lb",pounds:"lb",pound:"lb",cups:"cup",cup:"cup",tablespoon:"tbsp",tablespoons:"tbsp",tbsp:"tbsp",teaspoon:"tsp",teaspoons:"tsp",tsp:"tsp",milliliters:"ml",milliliter:"ml",ml:"ml","fluid ounces":"fl_oz","fluid ounce":"fl_oz",floz:"fl_oz",slice:"slice",slices:"slice",item:"item",items:"item",egg:"item",eggs:"item",scoop:"scoop"}; return map[unit?.toLowerCase()]||unit; }
      function foodById(id){ return [...foodBank,...state.customFoods].find(f=>f.id===id); }

      function parseNatural(text){
        const raw = (text||"").trim().toLowerCase();
        if (!raw) return null;
        const m = raw.match(/^(\d*\.?\d+)\s*([a-zA-Z_ ]+)?\s+(.+)$/);
        if (!m) return {query:raw};
        return { quantity:parseFloat(m[1]), unit:normalizeUnit((m[2]||"").trim()), query:m[3].trim() };
      }

      function matchFood(query){
        const q=(query||"").trim().toLowerCase();
        if (!q) return null;
        return [...foodBank,...state.customFoods].find(f=>f.name===q) || [...foodBank,...state.customFoods].find(f=>f.name.includes(q));
      }

      function convertMacros(food, quantity, unit){
        const u = normalizeUnit(unit) || food.defaultServing.unit;
        const gramsPerUnit = food.units[u] || food.units[food.defaultServing.unit] || 1;
        const grams = quantity * gramsPerUnit;
        const baseGrams = food.defaultServing.amount * (food.units[food.defaultServing.unit]||1);
        const ratio = grams / baseGrams;
        return {
          calories: +(food.macros.calories * ratio).toFixed(1),
          protein: +(food.macros.protein * ratio).toFixed(1),
          carbs: +(food.macros.carbs * ratio).toFixed(1),
          fats: +(food.macros.fats * ratio).toFixed(1)
        };
      }

      function addFood(dayKey, meal, input){
        const parsed = parseNatural(input);
        const food = matchFood(parsed?.query || input);
        if (!food) return alert("Food not found. Try another search term or add it as a custom food.");
        const quantity = parsed?.quantity || food.defaultServing.amount;
        const unit = normalizeUnit(parsed?.unit) || food.defaultServing.unit;
        const macros = convertMacros(food, quantity, unit);
        const row = { id: crypto.randomUUID(), foodId:food.id, name:food.name, quantity, unit, ...macros };
        dayRef(dayKey).meals[meal].push(row);
        state.recentFoods = [food.id, ...state.recentFoods.filter(id=>id!==food.id)].slice(0,20);
        persistAndRender();
      }

      function updateRow(dayKey, meal, rowId, patch){
        const rows = dayRef(dayKey).meals[meal];
        const row = rows.find(r=>r.id===rowId); if (!row) return;
        Object.assign(row, patch);
        const source = foodById(row.foodId);
        if (source) Object.assign(row, convertMacros(source, parseNumber(row.quantity,1), normalizeUnit(row.unit)));
        persistAndRender(false);
      }

      function totalsForDay(day){
        return meals.reduce((acc,m)=>{ day.meals[m].forEach(r=>{ acc.calories+=r.calories; acc.protein+=r.protein; acc.carbs+=r.carbs; acc.fats+=r.fats; }); return acc; },{calories:0,protein:0,carbs:0,fats:0});
      }
      function sumDays(){
        return dayNames.reduce((acc,d)=>{ const t=totalsForDay(state.week[d]); acc.calories+=t.calories; acc.protein+=t.protein; acc.carbs+=t.carbs; acc.fats+=t.fats; return acc; },{calories:0,protein:0,carbs:0,fats:0});
      }
      function statusMacro(v,t,pct){ if (v < t*(1-pct)) return "low"; if (v > t*(1+pct)) return "high"; return "on"; }
      function calorieStatus(v,t){ if (v < t*(1-thresholds.calories)) return "deficit"; if (v > t*(1+thresholds.calories)) return "surplus"; return "maintain"; }

      function renderTargets(){
        const day = totalsForDay(state.week[dayNames[0]]);
        const week = sumDays();
        const dayStatus = calorieStatus(day.calories,state.targets.calories);
        const weekStatus = calorieStatus(week.calories/7,state.targets.calories);
        document.getElementById("targetSummary").innerHTML = `
          ${["calories","protein","carbs","fats"].map(k=>`<div class="metric"><strong>Goal ${k}</strong><span>${Math.round(state.targets[k])}${k==="calories"?" kcal":" g"}</span></div>`).join("")}
          <div class="metric"><strong>Current day</strong><span><span class="pill ${dayStatus}">${dayStatus}</span></span></div>
          <div class="metric"><strong>Current week</strong><span><span class="pill ${weekStatus}">${weekStatus}</span></span></div>`;
        document.getElementById("targetInputs").innerHTML = ["calories","protein","carbs","fats"].map(k=>`<label>${k}<input type="number" min="0" step="1" data-target="${k}" value="${state.targets[k]}"></label>`).join("") + `<label>goal type<input data-target="goalType" value="${state.targets.goalType||"maintenance"}"></label>`;
      }

      function renderMeal(dayKey, meal){
        const mealRows = dayRef(dayKey).meals[meal];
        return `<div class="meal"><h4>${meal}</h4>
          <div class="inline-input">
            <input placeholder="Add food (e.g., 3 eggs or 150 g rice)" data-add-input="${dayKey}|${meal}">
            <input placeholder="Search food bank" list="foodSuggestions" data-add-search="${dayKey}|${meal}">
            <button data-add-recent="${dayKey}|${meal}">Recent</button>
            <button class="primary" data-add="${dayKey}|${meal}">Add Food</button>
          </div>
          ${mealRows.map(r=>`<div class="food-row">
            <div class="food-top"><strong>${r.name}</strong><div class="row"><button data-edit="${dayKey}|${meal}|${r.id}">Edit</button><button data-del="${dayKey}|${meal}|${r.id}">Delete</button></div></div>
            <div class="row" style="margin-top:.35rem;">
              <input type="number" min="0" step="0.1" value="${r.quantity}" data-qty="${dayKey}|${meal}|${r.id}" style="width:95px;">
              <select data-unit="${dayKey}|${meal}|${r.id}" style="width:auto;">${Object.keys(foodById(r.foodId)?.units||{[r.unit]:1}).map(u=>`<option value="${u}" ${u===r.unit?"selected":""}>${u.replace("_"," ")}</option>`).join("")}</select>
              <span class="tiny">${r.calories} kcal</span>
            </div>
            <div class="food-macros"><span>P ${r.protein}g</span><span>C ${r.carbs}g</span><span>F ${r.fats}g</span></div>
          </div>`).join("")}
        </div>`;
      }

      function renderDay(day, dayKey){
        const t = totalsForDay(day);
        const cal = calorieStatus(t.calories, state.targets.calories);
        const p = statusMacro(t.protein,state.targets.protein,1-thresholds.proteinLow);
        const c = statusMacro(t.carbs,state.targets.carbs,thresholds.carbs);
        const f = statusMacro(t.fats,state.targets.fats,thresholds.fats);
        return `<article class="card day-card"><div class="day-head"><h3 style="margin:0;font-family:'Raleway';">${dayKey}</h3>
            <div class="row"><span class="pill ${cal}">${cal}</span><button data-reset-day="${dayKey}">Reset Day</button><button data-copy-prev="${dayKey}">Copy Previous Day</button></div></div>
            ${meals.map(m=>renderMeal(dayKey,m)).join("")}
            <label>Notes<textarea rows="2" data-note="${dayKey}" placeholder="Optional coaching notes...">${day.notes||""}</textarea></label>
            <div class="totals"><div>Cal ${t.calories.toFixed(0)}</div><div>P ${t.protein.toFixed(0)}</div><div>C ${t.carbs.toFixed(0)}</div><div>F ${t.fats.toFixed(0)}</div></div>
            <div class="row" style="margin-top:.4rem;"><span class="pill ${p}">protein ${p}</span><span class="pill ${c}">carbs ${c}</span><span class="pill ${f}">fats ${f}</span></div>
          </article>`;
      }

      function renderWeekly(){
        const w = sumDays();
        const avg = { calories:w.calories/7, protein:w.protein/7, carbs:w.carbs/7, fats:w.fats/7 };
        let counts={deficit:0,maintain:0,surplus:0};
        dayNames.forEach(d=>{ counts[calorieStatus(totalsForDay(state.week[d]).calories,state.targets.calories)]++; });
        const adherence = Math.max(0,100 - Math.abs((avg.calories-state.targets.calories)/state.targets.calories)*100).toFixed(0);
        document.getElementById("weeklySummary").innerHTML = `<h2 style="margin:0 0 .7rem;font-family:'Raleway'">Weekly Summary</h2>
          <div class="weekly-grid">
            <div class="metric"><strong>Total calories</strong><span>${w.calories.toFixed(0)}</span></div>
            <div class="metric"><strong>Total protein</strong><span>${w.protein.toFixed(0)}g</span></div>
            <div class="metric"><strong>Total carbs</strong><span>${w.carbs.toFixed(0)}g</span></div>
            <div class="metric"><strong>Total fats</strong><span>${w.fats.toFixed(0)}g</span></div>
            <div class="metric"><strong>Avg calories/day</strong><span>${avg.calories.toFixed(0)}</span></div>
            <div class="metric"><strong>Avg protein/day</strong><span>${avg.protein.toFixed(0)}g</span></div>
            <div class="metric"><strong>Avg carbs/day</strong><span>${avg.carbs.toFixed(0)}g</span></div>
            <div class="metric"><strong>Avg fats/day</strong><span>${avg.fats.toFixed(0)}g</span></div>
            <div class="metric"><strong>Deficit days</strong><span>${counts.deficit}</span></div>
            <div class="metric"><strong>Maintenance days</strong><span>${counts.maintain}</span></div>
            <div class="metric"><strong>Surplus days</strong><span>${counts.surplus}</span></div>
            <div class="metric"><strong>Adherence score</strong><span>${adherence}%</span><div class="bar"><i style="width:${adherence}%"></i></div></div>
          </div>`;
      }

      function render(){
        renderTargets();
        document.getElementById("masterDay").innerHTML = renderDay(state.masterDay, "masterDay").replace("Copy Previous Day","Duplicate Day");
        document.getElementById("weekGrid").innerHTML = dayNames.map(d=>renderDay(state.week[d], d)).join("");
        renderWeekly();
        document.getElementById("foodSuggestions").innerHTML = [...foodBank,...state.customFoods].map(f=>`<option value="${f.name}"></option>`).join("");
        document.getElementById("customUnit").innerHTML = ["g","oz","lb","cup","tbsp","tsp","ml","fl_oz","item","slice","scoop"].map(u=>`<option value="${u}">${u.replace("_"," ")}</option>`).join("");
        document.getElementById("customFoodList").innerHTML = state.customFoods.length ? state.customFoods.map(f=>`<span class="pill on" style="margin:.2rem .2rem 0 0;">${f.name} <button data-del-custom="${f.id}" style="margin-left:.3rem;padding:0 .35rem;">×</button></span>`).join("") : "No custom foods saved yet.";
      }

      function persistAndRender(scrollTop=true){ saveState(); render(); if(!scrollTop) return; }

      document.body.addEventListener("click", (e)=>{
        const t = e.target;
        if (t.dataset.add){
          const [dayKey, meal] = t.dataset.add.split("|");
          const input = document.querySelector(`[data-add-input="${dayKey}|${meal}"]`)?.value || document.querySelector(`[data-add-search="${dayKey}|${meal}"]`)?.value;
          if (input) addFood(dayKey, meal, input);
        }
        if (t.dataset.addRecent){
          const [dayKey, meal] = t.dataset.addRecent.split("|");
          const recent = state.recentFoods.map(id=>foodById(id)).filter(Boolean)[0];
          if (recent) addFood(dayKey, meal, recent.name);
        }
        if (t.dataset.del){ const [d,m,id]=t.dataset.del.split("|"); dayRef(d).meals[m]=dayRef(d).meals[m].filter(r=>r.id!==id); persistAndRender(false); }
        if (t.dataset.edit){ const [d,m,id]=t.dataset.edit.split("|"); const raw=prompt("Update entry (e.g., 8 oz chicken breast)"); if (!raw) return; dayRef(d).meals[m]=dayRef(d).meals[m].filter(r=>r.id!==id); addFood(d,m,raw); }
        if (t.dataset.delCustom){ state.customFoods = state.customFoods.filter(f=>f.id!==t.dataset.delCustom); persistAndRender(false); }
        if (t.id === "applyMasterAll"){
          if (!confirm("Apply Master Day to all seven days? This overwrites current week plan.")) return;
          dayNames.forEach(d=>state.week[d]=clone(state.masterDay)); persistAndRender(false);
        }
        if (t.id === "applyMasterEmpty"){
          dayNames.forEach(d=>{ const hasFood = meals.some(m=>state.week[d].meals[m].length); if (!hasFood) state.week[d]=clone(state.masterDay); }); persistAndRender(false);
        }
        if (t.id === "resetMaster"){ state.masterDay = blankDay(); persistAndRender(false); }
        if (t.id === "clearWeek" && confirm("Clear all foods for Monday through Sunday?")){ state.week = Object.fromEntries(dayNames.map(d=>[d,blankDay()])); persistAndRender(false); }
        if (t.dataset.resetDay){ const d=t.dataset.resetDay; if (d==="masterDay") state.masterDay=blankDay(); else state.week[d]=blankDay(); persistAndRender(false); }
        if (t.dataset.copyPrev){ const d=t.dataset.copyPrev; if (d==="masterDay") return; const idx=dayNames.indexOf(d); if (idx<1) return alert("No previous day available."); state.week[d]=clone(state.week[dayNames[idx-1]]); persistAndRender(false); }
        if (t.id === "addCustomFood"){
          const name = document.getElementById("customName").value.trim().toLowerCase();
          const amount = parseNumber(document.getElementById("customAmount").value, 0);
          const unit = normalizeUnit(document.getElementById("customUnit").value);
          if (!name || amount <= 0) return alert("Add a valid custom food name and serving amount.");
          const food = {
            id: `custom-${toSlug(name)}-${Date.now()}`,
            name,
            defaultServing: { amount, unit },
            macros: {
              calories: parseNumber(document.getElementById("customCalories").value, 0),
              protein: parseNumber(document.getElementById("customProtein").value, 0),
              carbs: parseNumber(document.getElementById("customCarbs").value, 0),
              fats: parseNumber(document.getElementById("customFats").value, 0)
            },
            units: { [unit]: 1, g: unit === "g" ? 1 : amount }
          };
          state.customFoods.push(food);
          ["customName","customAmount","customCalories","customProtein","customCarbs","customFats"].forEach(id=>document.getElementById(id).value="");
          persistAndRender(false);
        }
      });

      document.body.addEventListener("input", (e)=>{
        const t=e.target;
        if (t.dataset.target){ state.targets[t.dataset.target]= t.dataset.target==="goalType" ? t.value : parseNumber(t.value,0); persistAndRender(false); }
        if (t.dataset.qty){ const [d,m,id]=t.dataset.qty.split("|"); updateRow(d,m,id,{quantity:parseNumber(t.value,0)}); }
        if (t.dataset.note){ const d=t.dataset.note; (d==="masterDay"?state.masterDay:state.week[d]).notes=t.value; saveState(); }
      });

      document.body.addEventListener("change", (e)=>{
        const t=e.target;
        if (t.dataset.unit){ const [d,m,id]=t.dataset.unit.split("|"); updateRow(d,m,id,{unit:t.value}); }
      });

      render();
    </script>
  </body>
</html>
